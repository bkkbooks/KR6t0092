body:
  text: 大日經供養持誦不同第二大悲胎藏嘉會壇中修灌頂時七日行法第七日上十七門前香水法初第七日暮以金剛薩埵加持自身爲毘盧遮那作禮然後誦降三世加持淨瓶中安五寳五縠香水華棄帛彩繋頸辟除去垢淨以法界心字然後加持竟當置白壇規壇門外以灑欲入壇者鈴宿障淨次加持瓶水令飮少許名金剛水亦名誓水自誓其心不退大菩提願今用祕觀以洒一切衆生令一切衆生皆爲法器不退菩提十八素辨供具法至日入時師伴弟子澡浴淨水興大悲心齎持供物往詣壇所先應一一具法加持如供養法中説第七日夜法事都畢初入夜分圖畫諸尊安置供具明相未出已前使發遣竟若淺行者於畫日規畫界域以白壇等草定諸尊形位分段至日將夕素辨五供於壇北面一處以白色規畫辨事眞言辟除置之不能一夜遍畫諸尊從第五日受持地以後漸作無妨又有尊形印字三種壇法如轉字輪品説持眞言行者供養諸聖尊當奉悦意華潔白黄朱色鉢頭摩青蓮龍華奔那伽計薩囉末利得蘖藍瞻蔔無憂底羅釼鉢吒羅娑囉是等鮮妙華吉祥衆所樂採集以爲鬘敬心而供養栴檀及青木苜蓿香欝金及餘妙塗香盡持以奉獻沈水及松香嚩藍與龍腦白檀膠香等失梨婆塞迦及餘樊香類芬馥世稱美應當隨法教而奉於聖尊復次大衆生依教獻諸奉乳摩酪飯歡喜漫荼迦百葉甘美餅淨妙粆糖餅布利迦間穴及末塗矢囉嫓諾迦無憂播鉢吒等如是諸肴饍種種珍妙菓蹇荼與石蜜糖蜜生熟蘇種種諸漿飮乳酪淨牛味又奉諸燈燭異類新淨器盛滿妙香油布烈爲照明四方繒幡蓋種種色相間門標異形類并懸以鈴鐸或以心供養一切皆作之持眞言行者存意勿遺忘次具迦羅奢或六或十八備足諸寶藥盛滿衆香水枝條上垂布間挿華菓實塗香等嚴飾結護而作淨繋頸以妙衣瓶數或増廣上首諸尊等各各奉兼服諸餘大有情一一皆獻之次説入漫荼羅所須次第世尊説偈中先答奉香華等及與衆寶瓶二句總名供養支分也就諸供養具中先則獻華凡所奉獻各隨諸尊性類及曼荼羅方位一一善分別之當令色香味觸適悦人心其水陸不祥諸華但可作折伏用耳白黄赤三色中如來部類當用白色蓮華眷屬以黄色金剛眷屬以赤色復次當如曼荼羅方位圓壇者以白方壇者以黄三角壇者以赤復次諸佛用白諸菩薩以黄諸世天以赤其餘香等亦當准傍此意兼採蘇悉地瞿醯等文用之不可備載也鉢頭摩是紅蓮華凡青黄赤白蓮等水生諸華皆可通獻諸尊也龍華莽那伽者此奔那伽是龍樹花彌勒世等於此樹下成佛其直云龍花者是龍中所當之華西方頗有其種其計薩羅華末利華得蘖囉華瞻蔔華無憂華底囉釼華鉢吒羅華娑羅樹華皆是天竺所有此方不可具識經云是等鮮妙華者梵本兼有或聲謂此等諸花皆可通用故擧以爲例然或餘方所有彼方所無但使人心所好世間以爲吉祥者皆可供養當一一存意善分別之接集以爲鬘者謂錯雜莊嚴或綴或結以行人慇淨淳厚心故則令諸尊歡喜護念也次明塗香其栴檀青木欝金皆此方所有苜蓿香各梵名薩跋㗚迦頗類今時姤路婆草是迦頗類今西方苜蓿香與此間苜蓿香稍異也及餘妙塗香者如沈水甘松丁香桂心西方荳蔲香附子等如蘇悉地瞿醯中説又云其塗香中勿用衆生身分及與紫礦并蟲等當取淨妙好者以水硏之若獻佛當用新好欝金或黒沈香和以龍腦蓮華眷屬當以白檀金剛眷屬亦當以白檀自餘諸尊隨意而合用之隨所合香皆置龍腦也次明焚香當用沈水香甘松香嚩藍香龍腦香白檀香西方名爲摩羅廋是山名即智度論所云除摩梨山更無出旃檀處是也白膠香是娑羅樹汁室利縛塞迦香者似此方薫陸香室利是具徳吉祥義言此香乃至天神皆悉愛樂故以爲稱也及餘焚香類芬馥世稱美者亦如上説瞿醯云燒香用白檀沈水相和供養佛部其樹汁香供養蓮華部黒沈及悉安供養金剛部或依彼法作普通和香以獻諸尊應當隨法教者謂以眞言密印去垢去垢加持等如供養次第中説自餘塗香華華等例此可知次云依教獻諸者如經大本中諸供等各有修治方便至於深密之意一一與法門相應此方既不具傳但依蘇悉地等如法造作結護加持即名依教也乳糜者西方粥有多種或以烏麻汁或以諸豆并諸藥味如十誦藥法等文廣明然最以乳糜爲上凡獻時當更加以蘇沙糖等令色味兼具而先奉之也又西方飯有多種亦以酪飯爲上獻此時應配以沙糖鹽薑諸味又當奉羹依彼方造之法或隨國俗所用也歡喜丸應以蘇煮諸餅糅以衆味及三種辛藥等令種種莊嚴曼荼迦是此方薄餅其百葉餅是西天竺餅法以糖蜜諸味和麺蘇油煮之至爲甘美沙糖餅者此沙糖名爲蹇荼状如益州所出者而色甚鮮白觸之便碎用此和水先以麺作餅數漬其中然後之淨妙謂務令精潔使色香兼備也布利迦譯云著餅以種種上味和合爲𫗝作之間穴餅有二種或刺爲孔穴或状如亂絲重重問穴加以衆味也末塗矢羅餅亦著𫗝兼以糖蜜塗之嫓諾迦餅用起麺作之著𫗝以蘇油煮状如水上浮泡甚可愛也無憂是卷縁沙糖餅播鉢吒是不起麺𩛞餅如是諸餚饍者亦謂隨諸方國所有上味及珍妙果隨意獻之也其白糖白石蜜沙糖蘇蜜又各別置之種種漿飮者西方漿法甚多皆雜以香藥美而愈疾及蒲桃等諸非時漿如毘尼所説其食乳酪亦用畢撥或龍腦等如醫明法爲之大抵西方造及飮噉先後次第多依藥術有養性防疾之功故多盡其天年尠夭折之患也凡置處當以塗香周遍塗之置垸内遍布蓮荷葉或芭蕉葉等令使周遍若無應用新淨白疊或淨布極以淨水浣濯以香遍塗塗布時上首諸尊當増加之謂中胎胎藏毘盧遮那第一院觀音金剛手次院文殊等四菩薩外院釋迦牟尼及所奉本尊等假令餘位置一分者上首諸尊當置二分或餘位置二分者上首諸尊置三分瞿醯云曼荼羅主當數倍加之雖有此階降不同然上自諸佛下至世間鬼神皆應等心供養務令豐厚均等也乃至不辨者但當供養部主或置内院運心供養一切諸尊所奉香華等例此可知也次説奉獻燈明者香油之類甚多謂簷蔔香油蘇摩那華油等凡作香油等法當取新華如作鬘法穿之懸置日中承以油器以物取油於華上灌之令還墮油中已又復取油灌之如是周而復始從日出至日入乃停明日又取新華作之如前令此油香氣與此華香氣均等然後止也其獻及燈明等諸器以衆寶爲上若不能辨用銀銅等乃至新淨瓦器亦得充事也四方繒幡蓋者若有財力當於一一尊所各別置之亦雜寶爲上若不能辨當用雜綵乃至繪畫畫時當用淨物不得用膠等也若不能廣造者下至四方各置一蓋門標鈴鐸等皆隨力分作種種莊嚴兼准約入祕密曼荼羅品中所示之相經云或以心供養一切皆作之者如世尊説諸供養中心最爲上如前一一供物皆當運心遍及法界以眞言祕印持之如供養次第中廣説或觀大寶樹王遍覆一切世界如華嚴菩提樹王之相具足莊嚴隨一一所須受用之具悉於中出無有窮盡遍至一切賢聖前廣大供養并普濟一切衆生如是運心已當用虚空藏轉明妃加持自然隨意成就也次説吉祥瓶法當用金銀等寶乃至無者應以瓷或淨瓦爲之極令圓滿端正又不洩漏如毘尼中方便灌灑淨水盛滿其中入五寶五穀五藥於瞿醯中説之然此五藥皆出五天此方不能遍有也又取如前所説諸塗香抹香和水兼置龍腦牛黄於瓶中挿以寶華或隨方土所有名華取其華果條葉茷好圓具者使間錯垂布令極端嚴以綵繒纒頸并繋花鬘塗以衆香結護作淨方便亦如供養次第中説於中胎藏當安五瓶最中大日瓶安華臺餘置外華蘂中凡獻中胎時四佛四菩薩各隨本座在華臺内奉毘盧遮那者置華臺前也若有力者於一一尊所皆置一瓶如不能爾隨内外方於上首諸尊處置之其四門處各置二瓶四角各置一瓶通門外別有一瓶用降三世眞言印加持之擬出入時灑身自護及召弟子入時亦用灑之護摩處又別置一瓶大略可百餘瓶也經云六瓶者是最少之限當於中胎四方各置其一門外一瓶必定不得闕之若用十八瓶者中胎置一瓶第二院大勤勇處蓮華金剛部主及門凡四瓶第二院四大菩薩謂文殊等各置一瓶外院四門四角及門外者用之適足所欲受灌頂者若多各隨人數令造一瓶不得闕少也如香水瓶者諸閼伽器亦然當用金銀白瑠璃等爲捖乃至商佉熟銅石木或以樹葉新瓦盛衆香水置諸名華如前所置瓶處亦一一置之又當於諸尊處各奉淨衣如前所説上首諸尊亦准獻法倍増故云各兼服若不能辨者但於上首諸尊處置之或以箱篋隨其所有置在中胎院内運心供養一切諸尊凡獻中胎供具當置中胎外一重空界中若獻無名諸尊當置三重界縁之内又供養時先當奉閼伽水次獻塗香次獻華燒香飮後獻燈明經文先後不次也復次若深祕釋者塗香是淨義如世間塗香能淨垢穢息除熱惱今行者以等虚空閼伽洗滌菩提心中百六十種戲論之垢以住無爲戒塗之生死熱惱除滅得清涼性故曰塗香所謂華者是從慈悲生義即此淨心種子於大悲胎藏中萬行開敷莊嚴佛菩提樹故説爲華燒香是遍至法界義如天樹王開敷時香氣逆風順風自然遍布菩提香亦爾隨一一功徳即爲慧火所焚解脱風所吹隨悲願力自在而轉普薫一切故曰燒香飮是無上甘露不生不死之味若能此味果徳成就更無過上味時即名入證故説爲所謂燈者是如來光明破暗之義言至果地時心障都盡傳無盡慧遍照衆生故説爲燈若竪説者一一地中皆具如是五義若横説者一一門中皆置如是五義例如上文所明諸雖異適口則一然隨調膳人有種種滋味不同餘香華等當知例爾若行者善能以五字門作金剛舞戲普應衆生譬如和五味布五綵韻五音調五藥雖性分不過五種而千變萬化巧轉不窮當知是人則解塗香三昧義也亦解華三昧燒香三昧飮燈明三昧義亦解此五種陀羅尼義以如是種種法門供具供養心王如來能令諸尊歡喜所求必獲若以此中意趣反觀世諦香華等自然知彼色香性分所應用處無量方便觸物而生也十九呼所度者法如法護身呼所度者爲彼作護灑以香水皆令一處次第而坐私云護用不動亦以一切爲所度者二十拼五色線法初道場門前運心頂禮一切諸佛如上警發中説然後持五色線向曼荼羅立而頂戴之轉字品釋云禮一切佛者禮於阿字眞言之體次觀自身作大日尊成就悉地品意處漫荼羅正於此中作之當於身内建立大壇然後圖畫外壇轉字品先心中作眼等次持線禮一切佛今且依具縁品次住甘露生三昧誦一切三世無礙力明妃有印成就菩提普門示現私云誦明妃巳亦誦經偈由是佛加持菩薩大名稱於法無罣礙能除滅衆苦時毘慮遮那世尊從三昧起尋念諸佛本初不生加持自身及與持金剛者告金剛手等云私云以應度者名金剛手當用觀行善男子諦聽轉字輪曼荼羅行品能作佛事普現其身次執金剛等從金剛蓮花座旋轉而下頂禮讃歎言歸命菩提心歸命發菩提稽首於行體地波羅蜜等敬禮先造作歸命談空者歎已而白言唯願法王哀愍演説私云亦見觀行次告執金剛等言我一切本初號名世所依説法無等比本寂無有上以加持故執金剛手能見勝願佛菩提座私云亦用觀行金剛頂云往詣蘇迷盧決云佛座似彼故云蘇迷盧非四寶所作者即世所稱須彌座是也是座名竪勝法界種云云前白壇所言大覺師子座是字體是也次身諸支分出現阿字有明私云與警發前先誦阿字其意同矣於一切世出世問聲聞縁覺靜慮思惟勤修成就悉地皆同壽命同種子同依處同救世者次拼修多羅所共建立須善通達法要亞近於師若不得者但取巳如法灌頂者又無此者置橛爲之又云要須取所欲灌頂弟子加持洒淨共行云云若觀行者一切衆生中道縁先發者以爲所欲灌頂弟子耳又有念繩法及知護方位法此中有三私云前起三輪巳警發之次壇安大海次妙高山次大蓮華次大宮殿次師子座次曼荼羅名白檀壇今於前白檀壇面拼修多羅一以前大日身拼外界四方四維十字界道師住火方北向弟子在尼方對持弟子右遶至涅方師右迴西向師右遶至庾方弟子右迴北向弟子右遶至尼方師右迴東向凡一周竟當臍在空轉字輪品與此大異即義釋云此處拼壇准經疑疏説左宜審問云云故今以具縁品爲正至第二周亦如前絣之次定四維師右遶至涅方弟子先在尼方右迴持之弟子右遶至庾方師右轉至火方皆令當齋在空弟子右遶至涅方師右轉至尼方弟子右遶至火方師右遶至庾方對持二轉何作三字等方便如前作三尊身無二相應形如來形性空形拼中台及三重界道准轉字輪品次作金剛薩埵或想印或字入内作中台拼次以此身作第一重拼次作釋迦或想印或字直向第三院拼之次想文殊或想字至第二院拼之注云更問先定了方下拼耶爲直爾下拼故知先在空定了方始下拼地是謂三重中台三重廣狹皆當展轉相半假令中台縱廣八尺第一重四尺第二重二尺第三重一尺阿闍梨言本法如此若恐大小相去不相稱者稍以意均調之於理無失也若轉字品中台六尺第一重三尺第二重一尺五寸第三重七寸五分三重各分爲三尺及作界縁先於第一重外界之裏取少分作界縁狹廣當以意裁此界縁内三分均分先定諸尊座位次定行道供養中間界分准轉字品以爲四重即有三線道第一爲行道第二爲置供物處第三是諸尊座處第四是外縁三重皆等外縁狹也界縁空位之中運心觀察隨其方面分位相應諸尊皆都請供養阿闍梨有所忌誤或不周悉其應請召而無位者皆當運心此中供養台外門口與行道處相連取少許立門位次第二重亦從外向裏分之次第三重亦如是准轉字品三重外門若有寛地任意大作云云三重院皆設四門開西一門以通出入餘門以線横斷之瞿云諸方開門隨彼方隅廣狹准爲九分取中一分爲門其餘八分門之左右各得四分所出入門稍令闊作餘門以白色末作畫閉之二十一加持五色法加持五色經云染彼衆生界以法界之味釋云以法界色染衆生心同菩提味以字門燒弟子心成灰燼後以字門洗淨清白然後染作同實相色私云成灰燼者謂初成身故於此中准染作之第一白色是大日色淨法界色信色先以大日加持自身心想字或印是廣大法界印想身即法界體明白無染離一切過衆生亦爾次入字門白色能令己身弟子衆生等大日身永離諸過次用先作阿利荼印於白色中想字門寂然光炎鬘淨月商佉色以此淨之成無垢色離一切過以色成字即轉爲大日尊四佛皆想寂然同用色作阿利荼印又云此一一尊通一切用身印第二赤色是寶幢色發心降魔進也先以字安心赤色自身同寶幢佛無能降伏最勝無比准上弟子衆生亦爾次用前印於赤色中想字門煥炳初日耀或赤或黄赤黄最勝無能壞以此淨之成降魔色色變成字即轉成寶幢佛第三黄色是婆羅樹王佛色成覺徳開念色先以字安心黄色自身同金色牟尼佛牟尼是佛都號也正受害諸毒光明遍一切准之弟子衆生亦爾次用前印於黄色中想字門是眞金色其炎亦然以此淨之成光遍色色變成字即轉成華開敷佛第四青色是無量壽佛色方便善現定色先以字安心青色自身同釋迦牟尼佛坐大菩提座除衆生恐怖降諸魔軍衆次用前印於青色上想字門超度於生死大寂菩提座身色如虹霓除一切怖畏其字如虹外輪有青暈之色其光亦爾以此淨之成超度色色變成字即轉爲釋迦佛義釋云一切佛用此字除衆生恐怖降諸魔軍衆故知無量壽佛亦用此字加持青色亦得然准諸文以無量壽爲西方佛是爲定也第五黒色是鼓音色垂迹顯本本住涅槃若捨加持心量非境慧色先以字安心黒色自身同阿閦佛以大慈悲爲護一切伏諸障故作毘倶胝怒形兼作印擬於作障者此尊名鉢羅底哩荼有印名寶冠擧手印是降伏通用印也作金剛忿怒形不須作佛形也准之弟子衆生亦爾次用前印於黒色上想字門其彩甚玄妙周遍生圓光如劫炎猛炎能怖一切惡降伏諸魔軍以此淨之成忿怒色色變成字即轉爲阿閦佛亦變作鉢羅底哩荼金剛忿怒尊私云白檀壇中此有阿閦准抄記誤誤矣鼓音爲定此囉等五字誦百遍或千遍二十二調彩色法從甘露王三昧起住無量勝三昧定中顯示遍一切無能害力明妃口説名眞言身現名明妃於一切如來境界中生由此明妃即同如來境界亦遍一切聲聞縁覺境界乃至初心修此明妃即入如來境界觀了頂禮世尊次先讀誦大般若經恭敬供養即作禮義次誦明妃八遍即調彩色二十三下彩色法須知有五通四重法一此阿闍梨以如來加持及阿字故即是大日調彩色已從定起旋繞曼荼羅入於内心以大慈悲力念諸弟子以羯磨金剛薩埵加持自身以字門及印作成事金剛薩埵而畫諸尊謂中台及第一重諸尊也次以字門及印作釋迦身而畫第三重諸尊私准上例知之次以字門及印作施願吉祥金剛而畫第二重諸尊此字等誦百遍或千遍二造壇有上中下若弟子堪能者師作畫像壇若弟子心極慇懃力不辨者聽作字壇私准爲中人作印壇凡曼荼羅轉字之法一一諸尊皆用本種子字或以諸部通用字如三部等若恐淺行阿闍梨不能如是速疾旋轉者但觀字門生無量光光所至處即現彼尊身也至法事夜亦皆効此又云先住瑜伽觀此曼荼羅大會一一形色相貎威儀性類座位諸印皆悉現前具足明了然後以慇重心即觀是大悲藏即我身方起手畫之私謂住瑜伽者品初大悲藏發生三摩地也彼有證入出現還入四重曼荼羅具用彼觀若不作尊形但密印者於金剛座上作蓮華臺臺上畫作標幟私云三昧耶形其字曼荼羅者經中有種子如法置之如經不載當取梵名最初字或可通用阿字又云眞言初中後取宗要字又云如來頂相具攝一切功徳凡手中無物可爲標幟者皆應置之其印如佛頂髻形三凡圖畫法當先建立内心祕密蓮華藏竟次造第一重伊字三點内脊屬次造第二重四菩薩等諸眷屬次及第三重一切世天眷屬又諸界道中央及第一重當具五色先以白色爲周界竟次於其外布赤色界次外又布黄色次外又布青色最外布黒色其第二重亦依如上次第布白赤黄三色第三重周界倶布純白一色皆極均調正直右旋布之其行道及供養處外縁等隨作一純色界瞿醯云但用白色白從中向外者明菩提心五根漸増乃至涅槃也若從淺至深佛同六趣爲初開菩提心故第三重唯白色界第二重白上加赤黄者赤是勤勇進修黄是念處開敷第一重三色上加青黒者青是如來三密無盡加持化大空色黒是如來壽量常住之身化深玄也私云圖尊文云第一重竟至第三重第三重竟至第二重轉字品絣線及圖尊文同此意也故此建立界道之文爛脱讀之四中台三重夾門皆竪幢旗以爲標誌謂之門二標相距尺量令中台正等上置横栝其廣亦然幢竿上皆置偃月月下置旗幢像取綿帛裁令正方可隅角破之以爲兩幟各附幢竿之外上鋭下垂也四維亦置幢竿偃月其標幟兩向置之於大勤勇門偃月上各置如意寶金剛手門偃月上各置拔折羅蓮華手門偃月上各置商佉其四維上皆置寶也夾門廂衞處如亞字形而於中間通道毎於曲際皆置金剛撅撅首如一股拔折羅其下銛鋭一廂六撅兩邊總十二撅四門并四角總五十二枚三重例爾其餘莊嚴大同入祕密位品准彼品文上有天蓋八方有幢懸五色線下有寶地而有無量諸佛菩薩報得樓閣内有賢瓶閼伽燈光供具天華伎樂種種莊嚴具檢彼文五備五色線皆以不動或降三世眞言加持一百八遍或一千八十遍阿闍梨正作法夜既畫曼荼羅竟先觀中台及第一院知無闕少即下金剛撅其撅以金剛線周匝圍之至通門則止不須横斷三重皆如是置之若不能爾其第三院必具此法勿得闕少至通門處當擧線隨門標屈曲而上使不閡頭既結界竟當依門出入不得趣越餘處毎出入時仍須誦不動眞言若是瑜伽阿闍梨亦可周匝以線圍斷若須出入時想擧此線而於下過過已則還如故或去門速急須出入者當觀自身作毘盧遮那以無罣礙身勿生越線之想隨意出入無咎也先就中台具縁品圖尊中唯出大日白檀壇唯出五佛八印品具出八印及壇法天竺圖具有九尊受持地中説五佛形色不説座印也八印品説八印及曼荼羅不説形座無畏軌説八葉一臺九尊字印不説形座法全軌説九尊身色印相不説座等轉字品説大日及三部尊名印字祕密品説印色位住三昧八印義釋同此品意私云諸尊略有十事壇座光種形容印物色用今具縁品説形容色物座故圖畫時必須具足阿闍梨安詳入中頂安心安遍諸支分持五股印誦薩埵明成事業金剛了次至一一尊位各觀其尊報得樓閣及座并種子轉成尊觀三昧了始下彩色一大日尊種子其印正受印内心妙白蓮胎藏正均等藏中造一切悲生曼荼羅十六央具梨過此是其量八葉正圓滿鬚蘂皆嚴好金剛之智印遍出諸葉間從此華臺中大日勝尊現金色具暉曜首持髮髻冠救世圓滿光離熱住三昧白檀文云觀作寶蓮華臺寶王宮殿於中敷座上置白蓮華以字門轉作大日身如閻浮檀金如菩薩像首戴髮髻猶如冠形通身放種種色光被綃縠是首陀會天成最正覺之標幟也彼界聖天本質嚴淨不假外飾世尊俯同其像祕釋如來妙嚴法爾無減不以外寶爲飾十住菩薩承佛神力見加持身其於常寂如在羅縠閻浮檀金自性淨色金剛智體最爲深妙放種種光普門大慧文轉字品圖尊文云其像坐白蓮華座上以髮爲冠不加綵飾用極細絹爲下裙更用極細羅縠輕細下服者用爲上服肉色相映内現色身作閻浮金色色之深金極光瑩者是也其佛繞身皆生光炎相令爲鬘連環不斷而遍身也私云敷座者大覺師子座在宮殿正中上有大壇壇中有白蓮華攝大軌云妙色超三界絹縠嚴身服寶冠紺髮垂寂然三摩地輝焔過衆電猶如淨鏡内幽邃現眞容喜怒顯形色操持與願等正受相應身明了心無亂無相淨法體應願濟群生私云別修行時觀大日尊隨四種事作寂息喜増怒攝定印寂操持攝與願益劍印伏今灌頂像是寂災法故作定印故白壇文云復當於正受轉字品云或以如來頂印或以字句謂字門祕密行品釋云如來頂印如佛頂髻形密印品釋祕藏記大日四佛種子中東南北西抄記有三義一第四重乃至中台二中台乃至第四重三四佛大日種子私云爲大日是修因向果種子爲大日是從本垂迹種子今灌頂像是垂迹形故爲定白檀釋四佛爲發行證入二寶幢佛白檀云寶幢華開鼓音無量入位品云東寶幢南花開北鼓音西無量東南普東北觀西南妙西北慈八印云東南西北餘同入位品云云白檀釋云次於四方八葉之上觀四方佛東方觀寶幢佛如朝日赤白相輝之色寶幢是發菩提心義如軍幢旗佛以一切智願幢旗樹下降魔色如朝日彼相應義三華開敷佛南方觀娑羅樹王花開敷佛身相金色普放光明如住離垢三昧標相長養萬行萬徳開敷離垢大空如百錬金是上妙色此閻浮金色淺稍濁不如自鏡以華葉佛從心量生故有差降四天鼓音佛次於北方觀不動佛作離熱清凉住寂定相是如來涅槃智義云不動非本名也本名當云鼓音如來如天鼓無形而説法悟生私謂抄記末云北方鼓音爲定前云北方阿閦經誤五無量壽佛次於西方觀無量壽是如來方便智方便無盡名無量壽梵音爾儞名爲仁者又降四魔故名勝者具翻其義謂勝仁者此二佛亦作眞金色稍閉目下視作寂滅三昧之形諸佛例如是也圖尊文云四葉四智四葉四行此八種善知識名持金剛慧印故云遍出諸葉間也又云從此現出三重眷屬此是如來祕密之法不可形於翰墨故在圖像以示行人若得深意自當默識今從此華臺中以表大日如來加持之相已如前釋所餘祕密八印下品及圖説之六普賢菩薩廣大軌云東南葉華座觀暗字光輪轉成普賢身七觀自在菩薩西北葉華座觀嚩字光輪轉成聖者身號名觀自在色如紅頗利八文殊師利菩薩西南葉華座觀阿字光輪轉成文殊身所謂一切智身如欝金色九彌勒菩薩經及義釋多云西北彌勒東北觀音抄記東南普賢菩提心西南文珠大智慧西北彌勒大慈悲東北觀音即是證以爲定也東北葉華座觀野字光輪加以三昧聲轉成慈氏尊大乘相應故身色如黄金私云此八尊種子及印竝依八印品是一法也或依白檀文以五佛種子印足之是一法也或依天竺圖觀之是一法也別有唐本胎藏三昧耶曼荼羅是金剛界九尊三昧耶形也今依義釋竝可用佛頂印畫中臺了敷五色界道建門標也已上中台也次至第一重又以前金剛薩埵身畫第一重諸尊一遍知印轉字品廣大軌言種彼東應畫作一切遍知印三角蓮華上其色皆鮮白光炎遍圍遶皓潔普周遍二虚空眼轉大次於其北維導師諸佛母晃曜眞金色縞素以爲衣遍照猶日光正受住三昧三諸佛菩薩眞陀羅尼轉言種復於彼南方救世佛菩薩大徳聖尊印號名滿衆願眞陀羅尼珠住於白蓮上得一觀自在轉北方大精進觀世自在者光色如皓月商佉軍那華微笑坐白蓮髻現無量壽二多羅言大種彼右大名稱聖者多羅尊青白色相雜中年女人状合掌持青蓮圓光靡不遍暉發猶淨金微笑鮮白衣三毘倶胝觀音之右言大種左邊毘倶胝手垂數珠鬘三目持髮髻尊形猶皓素圓光色無主黄赤白相入四得大勢毘倶胝左言大種次近毘倶胝畫得大勢尊被服商佉色大悲蓮華手滋榮而未敷圍繞以圓光五耶輸陀羅勢至左大種明妃住其側號持名稱者一切妙瓔珞莊嚴金色身執鮮妙華枝左持鉢胤遇六白處尊普大種近聖者多羅住於白處尊髮冠襲純帛鉢曇摩華手七馬頭觀音下言種大於聖者前作大力持明王晨朝日暉色白蓮以嚴身赫奕成炎鬘吼怒牙出現利爪獸王髮何耶掲利婆如是三摩地觀音諸眷屬一執金剛言轉種復次華臺表大日之左方能滿一切願持金剛慧者鉢孕遇華色或復如緑寶首戴衆寶冠瓔珞莊嚴身間錯互嚴飾廣多數無量左執拔折羅周環起光炎二忙莽鷄部主右言金剛藏之右所謂忙莽鷄亦持竪慧杵嚴身以瓔珞三金剛針部母右下有二使者皆女形也言彼右次應置大力金剛針使者衆圍繞微笑同瞻仰四金剛商佉羅執金剛左有二女使者言聖者之左方金剛商竭羅執持金剛鎖自部諸使倶其身淺黄色智杵爲標幟五月黶尊執金剛下有三使者乃至五六言於執金剛下忿怒降三世摧伏大障者號名月黶尊三目四牙現夏時雨雲色阿吒吒笑聲金剛寶瓔珞攝護衆生故無量衆圍遶乃至百千手操持衆器械如是忿怒等皆住蓮華中一不動尊言種次於西方畫無量持金剛種種金剛印形色各差別普放圓滿光爲諸衆生故眞言主之下依涅哩底方不動如來使持慧刀羂索頂髮垂左肩一目而諦觀威怒身猛炎安住在盤石面門水波相充滿童子形二勝三世言大種如是具慧者次應往風方復畫忿怒尊所謂勝三世威猛炎圍繞寶冠持金剛不顧自身命專請而受教已説諸界域諸尊方位等轉字品云東方一切諸佛以阿字門及大空點伊舍尼方一切如來母虚空眼應書伽字火天方一切諸菩薩畫眞陀摩尼寶或置伽字夜叉方觀世自在蓮華印并畫一生補處菩薩眷屬或作嚩字焔摩方越三分位置金剛慧印持金剛祕密主并眷屬或書嚩字復辨三分位畫一切諸執金剛印或書字句所謂𤙖字次涅哩底方於大日如來下作不動尊坐於石上手持羂索慧刀周匝炎鬘擬作障者或置彼印或書字句所謂唅字風天方降三世尊摧伏大障者有光炎大勢威怒猶如炎摩其形黒色於可畏中極令怖畏手持金剛或作彼印或書字句所謂訶字長聲次於四方畫四大護帝釋方名無畏結護者金色白衣面現少忿怒相手持檀荼或作彼印或置字句所謂嚩字夜叉方名壞諸怖結護者白色素衣手持朅伽并有光炎能壞諸怖或畫彼印或置字句所謂博字龍方名難降伏結護者亦如無憂華色被朱衣面像微笑在光炎中而觀一切衆會或置彼印或置字句所謂索字炎摩方名金剛無勝結護者黒色玄衣毘倶胝形眉間浪文上戴髮冠自身威光照衆生界手持壇荼能壞大爲障者或作彼印或置字句所謂乞懺二合字及一切眷屬使者皆坐白蓮華上眞言者如是敷置已法全軌云及一切眷屬皆坐白蓮華門門二守護無能三昧拳擧翼輪開敷智拳心舒風猶如相擬勢相對擧慧拳状如相撃勢不可越守護不可越言相向言攝大軌云佛子應善聽從初三昧耶至平等開悟東方第一院大日衆三昧多作天女形鉤至如來甲各坐白蓮臺輪刀槊商佉鈴鐸羂索等毫相口舌牙皆各執蓮華華上安標幟臍印於華中圖作蓮環光圓好之妙相腰如曲珠鬘藏如王馬陰施願法辨説蓮華上經藏念處十力等竝畫天人形寂靜三昧容當作佛頂相山河樹華藥都道鬼神天隨名作標幟年月六時神持華隨本教略説大悲藏曼荼羅位竟一切諸聖衆廣如大壇圖阿闍梨云第一院東方如來鉤乃至如來甲等皆是毘盧遮那三昧一一作天女形如曼荼羅方圓以辨其色坐白蓮華臺上手中復持蓮華華上各以物像用爲標幟如鉤輪刀槊商佉鈴鐸羂索甲胄等皆依本相畫之頂相豪相口舌身唇牙等例推可解如來臍於蓮上圖作連環圓好之相如來要亦頗旋曲如數珠鬘形如來藏如輪王馬寶藏相不現之形如來施願當作與願手如來法及辨説等或持經藏或作説法手念處十力等皆是止觀相應法作寂然三昧之容三昧耶當作佛頂相如來頂相具攝一切功徳凡手中無物可爲標幟者皆應置之若漫荼羅不作尊形但是祕密印者於金剛座上作蓮華臺台上如前畫作標幟其作字曼荼羅者經中有種子字當如法置之若經不載當取梵名中最初字爲種子字或可通用阿字北面蓮華部諸尊若經中不説形相者通作紅蓮華色或淨白色如金色尊等則依名辨之所持印相亦如佛部中説然用蓮華爲標幟如輪蓮華輪像當以四蓮華葉如十字之形用爲輪輻外作刄環圍之蓮華刀當於蓮華上置刀刀鋒上又用蓮華以爲標幟相金剛杵戟等皆亦如是蓮華羂索以蓮華爲兩茸鐸則以蓮華爲繋鬘則貫穿蓮華以莊嚴身或於所持華上置之戴塔吉祥於頂髻上置窣堵波或在所持華上蓮華尊即於華上重置蓮華寶徳尊蓮華上有寶能授一切願明王能滿一切希願其状一如觀世音手持蓮華華上或置如意寶隨息災増益降伏事在彼相應壇中大吉祥二手各持蓮華水吉祥或蓮中出水或手垂出水披鹿皮尊當以鹿皮嚴身如梵天像其契印曼荼羅例同前説通用娑字爲種子也南而金剛部諸尊亦可依經初所列名者皆具置之隨作方圓三角半月等壇身色亦爾或持一股拔折羅或持三股五𦙶上下二鋒等種種金剛標相如經中所説隨意置之其刀斧鉤針等皆以金剛爲標幟刀即刄鋒柄飾皆作金剛杵端銛鋭之形羂索連鎖兩端皆如三股拔折羅像輪以十字金剛爲幅利刄環圍遶之鐸以一股金剛爲上繋十字金剛爲舌餘皆例推可解契印曼荼羅亦於金剛座上置白蓮華華上各表其物若作字印曼荼羅執金剛所統眷屬通用嚩字爲種子餘金剛通用𤙖字爲種子也畫第一重了敷五色界道建門標一釋迦牟尼轉種言持眞言行人次往第二院東方初門中畫釋迦牟尼圍遶紫金色具三十二相被服袈裟衣坐白蓮華臺爲令教流布住彼而説法二能寂母世尊北大初次於世尊右顯示遍知眼熙怡相微笑遍體圓淨光喜見無比身是名能寂母三白毫相佛母北種復於彼尊右圖寫毫相尊住鉢頭摩華圓熙商佉色執持如意寶滿足衆希願四五佛頂一白傘蓋二勝頂三最勝四大聚五捨除是釋迦五智頂在釋迦南種輝光大精進救世釋師子聖尊之左方如來之五頂最初名白傘勝頂最勝頂衆徳火光聚及與捨除頂是名五大頂大我之釋種應當依是處精進造衆相五五淨居一自在二普花三光鬘四意生五名稱遠聞是東方最北遍種次於其北方布列淨居衆自在與普華光鬘及意生名稱遠聞等各如其次第六三佛頂一廣大二極廣大三無遍音聲是三部衆徳頂也五淨居南大於毫相之右復畫三佛頂初名廣大頂次名極廣大及無遍音聲皆應善安立五種如來頂白黄眞金色復次三佛頂白黄赤兼備其光普深廣衆瓔珞莊嚴所發弘誓力一切願皆滿七火仙東南隅護初字行者於東隅而作大仙像住於熾炎中三點灰爲標身色皆深赤心置三角印而在圓炎中持珠及澡瓶八閻魔王大日南言七母黒夜死王左方閻魔王手秉壇拏印水牛以爲座震電玄雲色七母并黒夜死後等圍遶九涅哩底鬼王西南隅言涅哩底鬼王執刀恐怖形十嚩嚕拏西方言諸龍嚩嚕拏龍王羂索以爲印十一帝釋舍脂夫人及六欲天東方五頂南言初方釋天王安住妙高山寶冠被瓔珞持拔折羅印及餘諸眷屬慧者善分布十二月天二妃左右九執流火摩利支釋衆南言左置日天衆在於輿輅中勝無勝妃等翼從而侍衞央誐羅伽在西瑜伽羅在東勃陀在南勿落賀薩鉢底在北設儞遮在東南羅睺在西南劍波在西北計都在東北又於南緯之南置涅加多謂天狗也又於北緯之北置嗢迦跛多謂流火也無畏本云摩利支前行翼從而侍衞十三大梵無熱等五淨居天在右也釋衆北近淨居天言大梵在其右四面持髮冠唵字相爲印執蓮在鵝上十四地神西方近門次北辨才并妃次北毘紐并商羯羅次塞建那西北隅風天也門南與日天對月天左右二十七宿十二宮神言種風言美音毘月西方諸地神辨才及毘紐塞建那風神商羯羅月天是等依龍方畫之勿遺謬持眞言行者以不迷惑心西方近門地神次北辨才天次妃次毘紐天并商羯羅亦塞逮建皆妃阿闍梨云此天衆梵釋左右列之西北隅風天西門南與日天對月天左右二十七宿十二宮神十五北方毘沙門左右八大將何栗底母吉祥天若本位西方大初字諸夜叉一摩尼跋陀羅譯曰寶賢二布嚕那跋陀羅譯曰滿賢三半只迦舊云散支四娑多祁哩五醯摩嚩多住雪山者六毘灑迦七阿吒嚩迦八半遮羅十六攝大軌鬼伊舍那歩多烏摩妃大軌次妃大初字十七通門大護二持明二龍王無能勝言二龍佛子次應作持明大忿怒右方無能勝左無能勝妃持地神奉瓶虔敬而長跪及二大龍王難陀跋難陀對處廂曲中通門之大護所餘釋種尊眞言與印壇所説一切法師應具開示次當出外於第二分畫釋迦牟尼被袈裟衣三十二導師相爲説最勝教施一切衆生無畏故或袈裟鉢印或字句所謂婆字第三院十方佛等各依常相圖之若作契印當以如來頂相種子則以阿字若聲聞縁覺一同比丘儀式是中縁覺小差別者謂或有肉髻等大人之相若契印當用鉢袈裟錫杖等其種子字如經中眞言所説東方日天之前或置摩利支天女如陀羅尼集中出之北方夜叉八大將圖中闕少者其形大抵相似皆被甲胄持伽馱印身相圓滿端正以彼趣此所求無乏常快樂自恣故也羊耳馬耳象耳等皆是鳩槃荼眷屬其形不同夜叉皆露身垂毛作非人之像耳同畜獸圖云持明仙者是餘藥叉等所成悉地持明仙者皆是專依呪術得悉地人直云諸仙者皆是圍陀事火之類勤修苦行成五神通仙又有夜叉持明是彼類中福徳最勝天趣之所攝者與世仙人又殊也其山海河地林樹穀藥城邑道路等神各以本名爲標識相山神坐山河神坐河其藥等或手執持或依其上當以義類推之華嚴中更有足行神身衆神是護諸跛行之類及護身神亦依次列之西方非人趣者當知毘盧遮那普門身中住是雜類鬼神傍生等圖中無別名相者多在其中所攝最多也跛係多是赤色辟多是黄色訖㗚慧拏是黒色其青色亦是中攝若依此方中明義則當各別出之訖勞是白色皆是一類龍王各依本色畫之若加即波字者其色稍淺遜那鄔波遜耶亦是護門大龍王皆右手持刀左持羂索主年月時分神等皆作天女形執持華枝等以爲標相若主善事者其色亦令色相圓備若主惡事者則持萎萃華果等其主六時神亦可持六枝之華作隨時榮落之像以表其事主晝夜者亦可以華敷華令明之他皆放此南方苾陵吃㗚知是摩醯首羅子身極枯痩以常降伏怨敵假使骨肉消盡要令得勝故爲此形私謂即是智度所云常修苦行割肉祀火感生諸惡神者所以位在南方其十二火天經中略説形像有一神闕名者依諸火天總相之形餘如圖中所示也如釋迦部鉢錫印等其類甚多經不具出隨此方處採擇餘經逐便安之設令缺無咎倶經中所出上首諸尊必一一畫不得遺謬蓮華金剛部等諸方例此可知畫第三院竟布白色界道建門標也次往第二重轉身成文殊畫第二重諸尊一文殊當釋迦内正東門中轉言種持眞言行者次往第三院先圖妙吉祥其身欝金色五髮冠其頂猶如童子形左持青蓮華上表金剛印慈顏遍微笑坐於白蓮臺妙相圓普光周匝互暉映二光網童子文殊北邊轉種右邊應次畫光網童子身執持衆寶網種種妙瓔珞住寶蓮華座而觀佛長子三文殊五使者列文殊左右諸奉教言種隨一左邊畫五種與願金剛使所謂髻設尼優婆髻設尼及與質多羅地慧并請召如是五使者五種奉教者二種共圍繞侍衞無勝智一髻設尼種二優婆髻尼三質多羅四地慧大種名財慧五請召初字四除蓋障大日左方轉言種一二三四大種名哀愍慧五大種名大慧纒六種名大慈生七八行者於右方次作大名稱除一切蓋障執持如意寶捨於二分位當畫八菩薩所謂除疑怪施一切無畏除一切惡趣救意慧菩薩悲念具慧者慈起大衆生除一切熱惱不可思議慧經云捨於二分位當畫八菩薩謂除蓋障側當作二使者然後如其次第置八菩薩凡例眷屬皆令最初者在右第二者在左第三復在右第四復在左如是一左一右次第置之今此八菩薩中先以除疑怪在除蓋右施一切無畏在左次復以除一切惡趣在疑怪之右以救意慧在施無畏左次復悲念在除惡趣右慈起在救意慧左次復以除一切熱惱在悲念右不可思議慧在慈起左諸餘布例他皆放此三地藏菩薩轉言大一寶處種大梵二寶掌種經名寶手三持地種四寶印手本大五堅固意種經有字次復作斯位至於北勝方行者以一心憶持布衆綵而造具善忍地藏摩訶薩其莊嚴巧麗身處於炎胎雜寶莊嚴地綺錯互相間四寶爲蓮華聖者所安住及與大名稱無量諸菩薩謂寶掌寶手及與持地等寶印手堅慧上首諸聖尊各與無數衆前後共圍遶當地藏右置寶處菩薩地藏之左置寶掌菩薩次寶處右置地持菩薩寶掌之左置寶印手持地之右置堅固意如是上首又各於其左右眷屬圍繞四虚空藏西方轉一種二三四五種名安慧次復於龍方當畫虚空藏勤勇被白衣持刀生炎光及與諸眷屬正覺所生子各隨其次第列坐正蓮上今説彼眷屬大乘菩薩衆應善圖藻繢誠諦勿迷忘謂虚空無垢次名虚空慧及清淨慧等如是諸菩薩常勤精進者各如其次第而寶莊嚴身略説大悲藏曼荼羅位竟此中眷屬所謂虚空無垢菩薩虚空慧菩薩清淨慧菩薩行慧菩薩安慧菩薩如前次第左右列之皆云等者明此上首諸尊各有無邊眷屬形相如圖次於外曼荼羅以法界性加持自身發菩提心彼捨三分位當三作禮心念大日世尊如前調色於第三分帝釋方作施願金剛童子三昧手持青蓮華上置金剛慧杵以諸瓔珞而自莊嚴上妙綃縠爲裙極輕細者用爲上服身欝金色頂上有五髻或置密印或置字句眞言曰南摩三曼多勃馱喃一鑁於其右邊光網童子一切身分皆悉圓滿三昧手執寶冠慧手持鉤或置彼印或書字句所謂染字焔摩方除一切蓋障菩薩金色髻冠持如意寶或書彼印或置字句所謂噁字長聲夜叉方地藏菩薩色如鉢孕遇華手持蓮華以諸瓔珞莊嚴或置彼印或置字句所謂伊龍方虚空藏白色白衣身有光炎以諸瓔珞莊嚴手持朅伽或置彼印或置字句所謂伊字長聲第二院諸菩薩衆若經中具載形相者一一如本教畫之無文者通用眞陀摩尼印當持蓮華華上置如意寶周匝焔鬘圍之或隨彼名中義趣以表其相如寶冠菩薩即於華上置寶冠寶網菩薩則於華上置網寶掌則於掌中持寶發心轉法輪菩薩即手中持輪所有諸闕位處皆置賢劫菩薩其使者奉教等皆作卑下之客其使者操持刀棒状如夾門守禦奉教者或捧持畫印或瞻仰所尊若受指麾教勅守護者則如守門通信有所諮白各隨其類也降閻摩尊是文殊眷屬具大威勢其身六面六臂六足水牛爲座面有三目色如玄雲作極忿怒之状六面尊形相大同然有四臂六足或二手二足當檢文殊梵本具足圖之然此等諸尊若餘經中具説形相者亦可依圖畫入曼荼羅中此諸尊毘盧遮那經不載眞言手印別出餘經者當依波經授與眞言手印令依此經供養次第法行之也畫第二重竟布白赤黄三色界道建門標也
