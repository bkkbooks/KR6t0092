body:
  text: 大日經供養持誦不同第三大悲胎藏嘉會壇中修灌頂時七日行法第七日下六十八増益守護清淨行法阿闍梨既畫漫荼羅竟周遍觀察知已圓備方出外如法灑淨如前運心普禮一切如來懺悔歸依自淨三業然後依供養法結三昧耶明等以護其身其諸供物亦以無動眞言去垢辟除清淨如法素具而預備之又當被服金剛甲等使一一如法阿闍梨言作如來身時用如來甲作金剛身當轉換用之又准蘇悉地等以如來肉髻圓光諸相而自嚴身尤善或可通用成辨諸事眞言作之六十九觀曼荼羅法如是作已然後向漫荼羅位隨其所應而坐住於瑜伽先用羅字門遍淨其心次復淨道場地悉除衆患相同虚空然後以訶字起大風輪於風輪上以縛字起香水海即用阿字門起金剛地妙高山王當知此曼荼羅即在其上上云畫了作法事時如法次第起金剛地觀此寶王宮殿在須彌山頂所有一一莊嚴皆如下品如供養次第法中方便觀作種種莊嚴以虚空藏持之次於一一漫荼羅諸尊位上各觀本種子字從此諸字字皆轉作本尊身若彼阿闍梨觀道未融恐延時節者但於中胎蓮華臺上而觀阿字字門出無量光遍照諸尊座位爾時諸尊即現爾時復以方便轉觀如是諸尊與我身無二無別是自身即在身中阿闍梨言若行者未住瑜伽云何能造如是壇法乃至初建立時已觀在身中然後圖畫若深行阿闍梨則常與如是大悲胎藏聖衆共倶亦證知即是我心同彼十縁生句畢竟不可得也七十召請法即觀本尊已次更運心作種種寶乘以不動眞言印加持以此奉迎衆聖及淨治道路次作召請瞿醯云當各各以本眞言奉請或以漫荼羅主眞言都請諸尊或依本教所説當隨意廣略兼用召請眞言即是也又此經宗即於本尊座受還以不來相而來至此道場不同麁方便中有此彼之相大衆集已當用無動明遣除障者即示三種三昧耶而作加持次當奉閼伽水及與敷座而作是言善來世尊善來世尊由本願力而來降赴願垂加持受斯所請及與微供大慈悲故唯垂納受七十一結界法時阿闍梨欲作金剛事業故更以無動慧刀自除身障轉作金剛薩埵降伏魔業仍以慧刀結諸方界復以如來大界眞言印重結周界以四大護各護一方又持無堪忍大護皆普護之阿闍梨凡造曼荼羅從初以來即用不動尊或以降三世尊護持是地中間毎持誦時即如法結界了還解之至作法夜更劑金剛線内具足結界其灌頂護摩壇處當於曼荼羅外更以線爲周域令與内界相通竝置所出入門若曼荼羅外界以金剛線圍斷者至護摩供養時亦當運心持通門之所擧上金剛線令通諸尊來往又結界時但當於本座處如常作法若行遶一匝而結周界者亦皆成就若結界了忽爾妄念故界破或種種魔事起即當念持無堪忍大護若欲令一切時無障者其周界及供物等皆先用大護護之後時障起又當使用也七十二供養讃歎法次當作禮奉閼伽水以大慧刀遍灑諸供養具淨已以不思議法界心獻塗香時即當住塗香三昧以塗香眞言持之次第供養時又一一加以彼本尊眞言或通或別或以自所持者其餘供物例爾復當作心供養法時以虚空藏明及以金剛阿梨沙吟諷讃歎七十三四方神供法次又出外施曠野神據圖於東門外施毘那野迦南門外施蘖㗚何是魅鬼著人者西門外施蘖羅是行疾疫者北門外施荼吉儞於門之左右各置四位然瞿醯云經是羅刹毘舍遮部多諸噉血肉者種種非人類或居地者或居樹林者及以心所念著各隨本方召集而遍施一切縁曼荼羅供養之悉皆取之和合一處并及諸香華等亦皆別出其分共置一處阿闍梨當起大悲無限法施之心於瑜伽中觀作種種受用亦以虚空藏轉明加持而用散施此諸鬼神受不作曼荼羅障也當從東方爲首次往南西北方如是一周竟又施東北方次往東南方西南方西北方又一周竟復至壇東施上方鬼神次往壇西下方鬼神大凡三遍下於諸法事中此法尤難當爾時或自現種種極可畏形或聞大聲雷震野干吼等如是種種異相阿闍梨當好自安心又欲施時先更防護其身使一一如法若彼盡更求者應復施之務使豐厚令其歡喜若物少者但隨所有而已凡壇中獻物亦當以平等之心不得有所遺闕瞿醯云若行時錯誤闕少即應補之仍乞歡喜所行類若不遍者應以餘物充數也七十四奉獻衣服法施諸方都竟洗手灑淨於門前燒香供養次入於内奉獻閼伽燒香運心奉獻衣服以爲儭施也七十五普門持誦法然後住瑜伽座以五輪字持身首置百光遍照王以元垢眼觀自心華臺本不生字方作普門持誦先於毘盧遮那心月中炳現眞言而後持誦并示密印周遍中胎藏已次及第二院諸尊乃至終竟或一一現前觀之而作持誦或自身作彼本尊於其心月現眞言字而作持誦乃至頓作曼荼羅身而作持誦隨行者觀心勢力若不能爾者當以一心誦部主眞言百遍隨所餘上首諸尊各誦七遍并作彼印也具如供養次第中説七十六引入弟子法阿闍梨如是作法畢已復誠心頂禮諸尊然後召諸弟子一一令入以如前香水灑彼淨授塗香令用塗手次授淨華略爲宣説住心品中菩提心實義令知自歸依處作眞正發心至誠慇重憶念一切諸佛所以然者以行者能發佛心即是佛子當受法王子灌頂之位生如來種性中故當動止云爲不忘諸佛今此經中毎將説一切眞言輒云普歸命一切諸佛即是此意也言淨佛者聲聞法中阿羅漢亦名爲佛諸餘大乘未了義經亦有成佛義然不得名爲遍淨今正明本心常佛故以淨字甄之梵本正翻佛家當云佛部是種族部類之義也時阿闍梨觀弟子身作五輪以五字持之兼於心華臺中置阿字等使即同大日之體以入佛三昧耶印印其頂上次以法界生印印心又作轉法輪印印臍輪上各三誦彼眞言次即轉彼心中阿字門爲縛字門以金剛薩埵印印諸支分所謂五處所以如此爲欲成彼金剛事業也時阿闍梨亦當更以三昧耶等而護持次取新淨白疊或餘繒帛先以不動眞言如法作淨復用本部眞言三轉加之如作大日曼荼羅即用毘盧遮那眞言蓮華手金剛手亦當准説用此淨帛周覆弟子面向門當深起慈悲護念之心耳語告彼三昧耶或勿令諸餘未入壇者聞聲此一偈當於轉字輪漫荼羅行品中説之又觀彼頂上有一囉字字上安點故云嚴以大空點此是囕字也此字四邊遍有光炎猶如華鬘連環不斷字中又遍流出白光如淨滿月之暉以此淨法界心所持故能除内外諸障次引至第一重門遜那優那二龍王守衞之處令正當門廂不得前却師當爲彼結作三昧耶印三遍誦彼眞言置華印上令弟子至誠心向道場散之隨華所墮之處當知即是行人往昔因縁法門善知識即依此方便門進趣修行也瞿醯云將入壇時阿闍梨應作是言我某甲如法作此曼荼羅將弟子入隨其福徳種性及與成就所堪法器唯願於此曼荼羅中示現其相既散華已次應開面令瞻覩道場以歡喜心而告之曰汝今觀此妙曼荼羅深生敬信汝已生諸佛家諸明尊等同共加護一切吉祥及與悉地皆悉現前是故堅持三昧耶或於眞言法教應勤修習次令弟子以香華等普供養曼荼羅聖衆即於道場授與本眞言印令坐一處誦之次引餘人凡阿闍梨當觀華所至處辨其性類若隨佛首上當成就佛頂及毫相等墮面上應成就佛眼在身中分當知成就諸心若墮下分成就諸使者等又隨佛身上中下分知上中下成就蓮華金剛手亦然自餘諸尊但知上中下之相若華墮去彼尊遠者久遠方乃成就若隨諸供養院隨所屬之尊授彼眞言若墮兩尊之間當觀其近遠若華先墮内院即移出外院者彼人信心不具若強持誦得下成就隨諸界道及行道院者彼人無決定心不獲成就若彼欲更擲者應爲作護摩然後擲之餘如彼説也次當爲弟子作寂然護摩是扇底迦法亦可翻爲息災也此是一種支分今如來答中約行事次第故説加持教授分未竟即於此中間説護摩或可與灌頂等法合爲一種支分耳七十七護摩法別出七十八儭施師法行者護摩竟應教令儭施金銀衆珍寶象馬及車乘牛羊上衣服或復餘資財弟子當至誠恭敬起慇重深心自忻慶而奉於所尊以修行淨捨令彼歡喜故已爲作加護應召而告言今此勝福田一切佛所説爲欲廣饒益一切諸有情奉施一切僧當獲於大果無盡大資財世説常隨生以供養僧者施具徳之人是故世尊説應當發歡喜隨力辨肴膳而施現前僧經云行者護摩竟應教令儭施以下是答祕密主問中云何供養師句猶屬加持教授支分也所以自教弟子令其儭施者非爲貪著是物而求索之爲發生彼善根成就灌頂功徳故若弟子能以内外所有種種資財爲求大事因縁無所慳惜至誠慇重奉報傳法之人則能摧壞無量宿障又自見壇那利益深生慶幸之心我今捨此世間所愛之財五家所共多諸過患用資無上法寶正法之財遍施衆生常無窮盡如是思惟已其心歡喜歡喜故則離疑悔故便得内寂安樂而住然後以法水灌之則能永離塵垢也若無物者乃至捨身而供養師謂以此身奉事供給阿闍梨不憚疲苦常不捨離諮求正法乃至不惜躯命爲求道故爾時阿闍梨感其慇重生悲念心誨以深祕方便乃至自所受持眞言功行垂滿於道場中作法迴用施之少用功力得大成就此是諸施中上也瞿醯云弟子當於護摩處以至誠心頂禮阿闍梨先當奉獻衣裁二然後捨施餘財又彼云是灌頂了廣示曼荼羅相教眞言印方乃奉施與此經不同任隨所用耳七十九灌頂壇法以下明灌頂法亦屬加持教授分然此灌頂亦通諸餘法事或可別爲一種支分也阿闍梨作第二曼荼羅當與中曼荼羅相對去大曼荼羅二肘第二是次少義即是相待言之也凡大鑪應當中胎若處所不便得漸移近南乃至對西南角此是灌頂壇又在火壇之北亦令四方均等唯置一門門向壇開也其壇四角外畫四執金剛火方置住無戲論涅哩底方置虚空無垢風方置無垢眼伊舍尼方置被雜色衣壇中作八葉大蓮華王鬘蘂具足於四葉中置四伴侶菩薩帝釋方曰總持自在王菩薩焔摩方曰念持那伽方云利益心菩薩夜叉方曰悲者菩薩其四隅之葉置四奉教者火方名著雜色衣濕哩底方名滿願風方名無礙伊舍尼方名解脱經云中央示法界不可思議色者即是囕字作純白色所謂不可思議法界之標幟也復次深祕釋者方壇即是大因陀羅心王金剛界體住無戲論即是本原性淨三世無障礙智戒也由此戒故一切戲論皆息故得成無師大慧塵翳都盡如淨虚空故名虚空無垢如虚空中無垢障時極目十方無所不覩般若亦爾由離一切相故於一切種無不見聞覺知故名無垢眼如明眼人則能自在作諸事業今以無障礙悲普觀一切根縁已即當普現色身而導利之故名著雜色衣若此四種金剛慧印於一心中具足無缺即能鎭此心地堪持灌頂慧身猶若菩提樹下從金剛地際以來皆悉堅實是故如來成道時不傾不陷也四伴侶者謂心所有法是心王伴侶言此淨法界心王成就四法能行四種如來事則堪灌頂受法王位初云陀羅尼自在王者即是通達阿字門見此眞言王時於一切陀羅尼門皆得自在故以爲名又以總持自在故成如來念覺如意珠王能持十方佛國如彼龍宮祕寶能持大海不令從溢亦能持之令無耗竭故曰念持已得如是念空便憶本願普雨法財充滿法界遍施衆生故名利益心出無盡資財作無限大施而諸下劣衆生無心受用不肯求之爲此興大悲心以種種方便調諸窮子故曰悲者言四奉教者即是從此四門折伏攝受行如來事當知著雜色衣即是陀羅尼自在王所爲事業滿願是念持如意寶王所爲事業無罣礙是大慈法施所爲事業解脱是大悲方便拔苦衆生所爲事業故名四奉教者也復次云四寶所成瓶者即是毘盧遮那四徳之寶置在中胎四角如上所説以不動明王作加持已復用四菩薩眞言各持一瓶普賢是無盡願行寶慈氏是無盡饒益衆生寶除蓋障是無盡淨知見寶除惡趣是無盡大悲方便寶復次普賢是遍法界淨菩提心慈氏是此淨心於中胎藏發生根牙莖葉除蓋障是此淨覺樹王妙嚴華菓顯現開敷除惡趣是此收果實後種一切衆生田中如是施轉相生無有窮盡故以此四寶之瓶盛滿種種寶藥諸穀所漬性淨之水用灌蓮華臺中不思議法界心是故得名法王之子當知一種寶瓶還與一菩薩一金剛一使者機感相應以方便法門對之則可知也八十灌頂壇供養十三座讃歎供養弟子法凡欲灌頂時用辨事眞言加持座物安置蓮華臺上阿闍梨復爲弟子如法護身先以不動明王用除諸障次用三種三昧耶加持三處金剛薩埵加持支分已令依吉祥座法而坐其中所有塗香華燈閼伽水等先以如法加持一如上法阿闍梨先當奉彼香水次用塗香遍塗其身以華鬘冠飾其身以爲瓔珞次奉焚香薫之諸燈明布列其前并獻諸凡此供物總有十三座謂四金剛四菩薩四使者并及弟子其弟子供物最令豐厚猶如供養本尊也亦可於大曼荼羅中置位供養至灌頂時但當持彼名號請加持弟子其四菩薩於第一院各於一方置之使者在如來下狹門左右又備新淨白傘上懸華鬘及白繒亦先用不動去垢除障以大日如來眞言持之阿闍梨自執用覆其上復令餘人執淨犁牛拂及扇香爐皆以辨事眞言加持又於箱中置衣并諸吉祥之物即是金箆明鏡輪寶商佉之類并持四寶之瓶而以供養并奏攝意音樂此曲具在瑜伽大本中若獻塗香曲華燈飮等皆亦如是一一歌詠皆是眞言一一舞戲無非密印乃至無人解者阿闍梨當自奏之若不能爾不名兼綜衆藝也言攝意者世人見美妙色聲身心爲之醉情有所住不復異縁今此金剛伎樂能感人心亦復如是如馬鳴菩薩自奏頼吒和羅曲五百王子聞之同時捨家入道即此義也瞿醯中但云若得辨者應作音樂經云吉祥伽陀等廣多美妙言者此頌凡有三種一名吉慶二名吉祥三名極吉祥皆是阿利沙加陀用此慶慰其心仍有加持之用阿闍梨當自説之次於下文且出吉慶一種於此方所用已粗周備耳説此偈時當自持白拂而拂其身八十一正灌頂法讃誦畢竟阿闍梨復當頂禮曼荼羅一切諸尊爲灌頂故至誠啓白即持寶瓶徐遶漫荼羅三匝已復更如法加持至弟子所先用囉字爲火焚燒其身悉成灰已方用四瓶次第灌已觀此灰中作嚩字門其色純白從此出生五字所謂阿鑁囕𤙖欠持其五輪次觀暗字在其頂上轉成中胎藏又從此字生三重光焔一重遶咽上隨所照及之處諸尊隨現即成第一院漫荼羅次一重光遍遶心上諸尊隨現成第二重漫荼羅次一重光遍遶臍上諸尊隨現成第三重漫荼羅爾時弟子都成漫荼羅身若更深釋即是普門法界身八十二供養弟子傳授道具法次當引至一處阿闍梨親爲著衣首冠白繒以香塗身飾以華鬘焚香燈明如法供養并絡膊繋金剛線及臂釧指鐶其制作法如悉地供養中説又阿闍梨先用囉字加持金錍瞞字加持明鏡法輪法螺眞言加持輪及商佉復當於弟子前以金錍瑩拭其目而爲説偈云佛子佛爲汝決除無智暯猶如世醫王善用於金箆當觀囉字門淨目中垢障次又現前示彼明鏡而爲説偈云諸法無形像清澄無垢濁無執離言説但從因業起如是知此法自性無染汚爲世無比利汝從佛心生當觀瞞字門淨其心中垢障次持法輪置彼二足之間并授商佉於其右手而爲説偈云汝自於今日轉於救世輪其聲普周遍吹無上法螺勿生於異慧當離疑悔心開示於世間勝行眞言道常作如是願宣唱佛恩徳一切持金剛皆當護念汝各用彼眞言加持之所以然者若行人能以淨眼現前自觀心鏡即是成大菩提成大菩提已當轉法輪轉法輪者非獨爲若干數量衆生而作限劑乃當覺悟一切衆生是故吹大法螺凡祕密宗中皆託因縁事相以喩深旨故作如此傳授也八十三三昧耶法阿闍梨次當持傘用覆其上引令旋遶漫荼羅三匝先遶第一行道院後遶第三行道院如是行道時阿闍梨當誦吉祥極吉祥偈等或可誦吉慶梵文既同畢已復至西門二龍廂衞處令其慇懃禮拜其傘當隨身上下而以薩之即當爲説三昧耶偈所謂祕密藏中四種重禁此事皆是阿利沙偈下當釋之瞿醯云弟子至西門禮拜已阿闍梨當白諸尊言我某甲已與某甲灌頂竟今付屬諸尊令持明藏作是語已應當被傘令其起立對漫荼羅前爲説三昧耶戒今慈愍聽許也今已成就漫荼羅持明阿闍梨竟諸佛菩薩及眞言主一切天神已共知汝若見衆生堪爲法器憐愍彼故當爲建立漫荼羅而教授之三昧耶偈佛子汝從今不惜身命故不應捨正法捨離菩提心慳悋一切法不利衆生行佛説三昧耶汝善住戒者如護自身命護戒亦如是應至誠恭敬稽首聖尊足所作隨教行勿生疑慮心前云耳語告一偈者猶僧祇家授六念薩婆多授五時法以此驗知曾受具戒以不今此四戒如受具戒竟已略示戒相當知即是祕密藏中四波羅夷也如人爲他斷頭命根不續則一切支分無所能爲不久皆當散壞今此四戒是眞言乘命根亦是正法命根若破壞者於祕密藏中猶如死尸雖具修種種功行不久敗壞也第一戒不應捨正法者爲一切如來正教皆當攝受修行受持讀誦如大海呑納百川無厭足心若於諸乘了不了義隨一法門生棄捨之心聲聞乘中若對堪作法人心生口言隨捨一法亦成捨戒雖於具足毘尼不隨衆數然非犯戒之罪今此祕密大乘畢竟無有捨義故則成重罪也又此一切法門皆是大悲世尊於無量阿僧祇劫之所積集爲欲普門饒益一切衆生故而演説之猶如字輪不可棄一如聲聞乘人隨捨一事猶因和合義斷喪失律儀何況摩訶衍耶第二戒不應捨離菩提心者此菩提心於菩薩萬行猶如大將幢旗若大將喪失幢旗時即是三軍敗績墮他勝處故犯波羅夷也有人雖愛重三乘法心不棄捨然作是念無上大乘種種難行苦行非我所堪且當於小乘中而取滅度或言我當廣殖善根供養三寶長受人天福報無上菩提是普賢文殊諸大人等之所行處今我何能得之如是等種種因縁退菩提願即是自斷命根死犯波羅夷罪又此菩提心畢竟無有可退義故不同聲聞法中乃至放捨三歸退爲白衣外道者佛亦慈愍聽許也第三戒於一切法不應慳悋者有人雖不捨正法不離菩提心然於正法慳悋不肯觀機惠施亦犯波羅夷罪所以然者因如來出世然後得乃至一句一偈無非世尊喪捨身命爲其僮僕然後得之是一切衆生父母遺財非獨爲一衆生故而今竊爲已有故此祕密中同於盜三寶物也略説法有四種謂三乘及祕密乘雖不應悋惜然應審觀衆生量其根器而後與之若輒爾談説深祕之事令生疑謗斷彼善根則於第四戒中得波羅夷罪其直爾慳財不肯惠施者於十種方便戒中結犯下品説之第四戒勿於一切衆生作不饒益行者此是四攝相違法四攝是菩薩具戒中四依若受戒時先當問此遮難若能奉行者方爲授之不能奉行則非摩訶薩埵不得爲受所以然者菩薩發一切智心本爲普攝一切衆生爲作三乘入道因縁故而今反作四攝相違法起衆生障道因縁一切衆生亦同字輪之體不得相離故隨損一一衆生善根或於彼捨饒益行皆犯波羅夷罪例如聲聞法中隨捨七衆一人即是不和合義斷失具足律義也若但隨煩惱之心造婬盜殺妄等而未損彼三乘善縁猶如聲聞法中偸蘭遮罪是方便學處中攝也次下是阿闍梨教誡之語佛説三昧耶者梵本兼有此字言十方三世佛共説此三昧同行一如實道更無異路今曼荼羅中一切集會現爲證驗也梵云蘇沒羅多翻爲善住者以其善住三昧耶故亦名善住戒者即是異門説佛子之名如護汝父母生身所有躯命今受此法身慧命亦當如是也汝今已受具戒竟當至誠於彼諸尊作禮而退自今已後凡有所作當依眞言法教如説行之同彼新受戒者一切事業先當問師勿得率心專擅令生惡邪疑悔也復次阿闍梨説持明藏中二部戒本一一皆是眞言可以成辨諸事如來以此加持諸弟子故今此中諸偈亦爾作法時當誦梵本兼以字門而廣釋也八十四三昧耶戒功徳法爾時金剛手白佛言世尊若有諸善男子善女人入此大悲藏生大曼荼羅王三昧耶者彼獲幾所福徳聚如是説已佛告金剛手言祕密主從初發心乃至成如來所有福徳聚是善男子善女人福徳聚與彼正等祕密主以此法門當如是知彼善男子善女人從如來口生佛心之子若是善男子善女人所在方所即爲有佛施作佛事是故祕密主若樂欲供養佛者當供養此善男子善女人若樂欲見佛即當觀彼金剛手等上首執金剛及普賢等上首諸菩薩同聲説言世尊我等從今以後應當恭敬供養是善男子善女人何以故世尊彼善男子善女人同見佛世尊故八十五都説三昧耶戒瞿醯云阿闍梨如上所説作護摩已以用淨水灑諸弟子頂上廣示曼荼羅位教彼大印及明王眞言令坐一處持誦之次教以香華供養本尊及餘諸尊竟次第而坐師自誦般若經令彼聽之次爲都説三昧耶戒汝等從今常於三寶及諸菩薩諸眞言尊重恭敬供養於摩訶衍經恒生信解凡是見一切受三昧耶者當生愛樂於尊者處恒起恭敬不應於諸尊所而懷嫌恨及與信學外道經書凡來求者隨力施與於諸有情恒起慈悲於諸功徳勤心修習常樂大乘於眞言行勿得懈廢所有祕密之法無三昧耶者不應爲説大略如此餘如供養法初品中廣明八十六教授眞言印如是教授已各各示彼本眞言印所屬之部并爲解説本曼荼羅八十七後供發遣然後作最後護摩護摩竟更加如法護身施諸方施畢洗手灑淨與諸弟子以香華等次第供養一切諸尊誠心頂禮并乞歡喜復執閼伽各各以本眞言如法發遣或依本教或以漫荼羅主眞言一時發遣准同諸法八十八遺物諸供養當施貧人不應與狗烏等噉所有財物阿闍梨應取隨意受用若不能用當施三寶傘掃等施佛塗香燒香等施法衣瓶器等施佛及四方僧若無僧當與七衆人其弟子乃至少分不得用之若用犯三昧耶如彼廣説也
