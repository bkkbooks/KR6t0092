body:
  text: 大日經供養持誦不同第五大悲胎藏生祕密曼荼羅壇事業灌頂七日行法六日行法第三字輪品及祕密品都會壇中修灌頂時一切諸尊普念誦法經中三部四處布字法及具五事四法并作諸尊總別壇法一一具足種字三昧形法異前二法攝大軌下卷初明三部四處布字爲諸尊種子觀布字門義法具足十號法金剛字句法是爲成身法次五輪圓壇置身五處法大眞言王法是成壇法即今所用祕歳壇法次淨心垢五輪大壇觀身同體壇場莊嚴及諸尊位皆觀身内自身爲壇令投華法是以印法修灌頂法非此事業壇法次九尊印眞言是今祕密壇文次三月修法百光王法六月修法是別持誦法則次分限畢五供解界觀經印砂六念及加持句印眞言法是通修行法則次阿闍梨眞實智法一切布字法是大阿闍梨常念誦法非此灌頂壇法其供養儀諸尊印明灌頂法則略同上中兩卷亦有殊異具如經説彼上卷云小乘明三輪大乘明五輪五輪是今所用異前二法云云然灌頂有三種一者但以印法作之離諸作業此是入祕密曼荼羅謂有弟子誠心慇重深樂眞言之行志求大乘然資力乏少若令一一具求衆事反當於道有礙如是之人師當深起慈心觀彼心行而攝引之然但得爲此一人而作之不得多爲人作何以故恐彼資力能辨者生怠慢心而不盡心植衆徳本故作時隨力令辨少供供養三寶此第一最勝謂本尊身語意三合爲一三倶淨故以此印印之此最勝也師祕受其眞言手印之類初但以手印二具足法事三在三昧灌頂也二者以作事業而灌頂者即是師及弟子皆先作事業也謂令弟子七日以來誠心禮悔之類師亦於七日以來爲其持誦祕求感應及令辨諸供養物香華之類縁壇所須一一令作然此灌頂與前者不殊但以有資力故令盡其所力於諸佛海會之中而作無盡供養由此因縁施福之果不可窮盡故須灌頂勸彼令具作也三者但以心而作灌頂如是灌頂不擇時不擇方謂向東設位或向南等皆離也由此弟子已修眞言之行於祕密藏中有所堪任令師心悦此又最勝也師弟倶得瑜伽以心灌頂猶如摩頂授記也又能盡心承奉其師於種種善事無有違越以此因縁令尊歡喜故爲作心想灌頂也其灌頂法瑜伽阿闍梨先入淨室而住三昧如前所説以身四分作四重曼荼羅位亦如毘盧遮那所現之方位一一無異如是作已以祕密加持故令彼弟子先在外而待命者自然而得金剛手威神加持引之令入亦自然而解作印等一一如法既入室已以金剛手所加持故現覩曼荼羅諸尊之位宛然現前一一本尊之形及印字等亦悉明了爾時行者復以加持力故手中自然蒙授妙華而以供養大衆隨所墮本尊之處其尊即起以妙音聲而安慰之爲作攝授爾時本尊即取一一大會諸尊處甘露三昧之水而爲彼弟子現前灌頂爾時阿闍梨但坐一處而入三昧寂然不動而能成就如是勝事也令尊歡喜相應謂承事本尊本尊歡喜以行者現前而爲灌頂以遍數及行具作故也承事念誦令尊歡喜現前説法如所説而作之也准前例之如弟子能事師令歡喜師爲灌頂教授也次答三昧耶有幾種者今世尊答略有五種也三昧耶者如有人於衆多國王大臣所尊重集會之處而自發言作大要誓我今如是之事永當不作如是之事依行之以自對可信之人而發誠言若有所違即得重罪是故三昧耶者即是不可違越義也略而言之即是戒義也此中五種者第一但得遙見曼荼羅謂如造曼荼羅時謂見具足曼荼羅也忽有諸人善心隨喜欲求禮拜供養爾時阿闍梨聽令引入於壇外遙令禮拜以華香等遙散道場而作供養以得見如是法會故無量罪業皆得滅除然未令授彼眞言及印是第一也第二見曼荼羅座位謂引彼入於壇中禮拜供養投華散於本位師告彼汝華墮某尊位上爲説本尊名號并明入壇門内悉見諸位也此人説名爲第二三昧耶也若請眞言及印亦得隨所應者授之第三見曼荼羅及印位并作諸事者謂阿闍梨從首至末爲此人而作曼荼羅乃至諸尊及印等一一告示又授眞言手印一一行法皆教授之此是第三也第四者已能依隨行法修眞言門所有法則一一通解具知縁檀所須方便衆藝堪在師位悦可師意師即爲作傳教曼荼羅告言汝自今以後亦如我無異造曼荼羅度諸弟子令法久住佛種不斷故此第四也第五即是祕密三昧耶如教所説印壇配位皆見若不經入此壇祕密智不生也是故當於祕密壇中如法作灌頂是名第五智者應知也若異此者不名三昧耶也即前所説第三灌頂時所入也若異此五事不名善作三昧耶然祕密曼荼羅復自有五種第一於師所授得眞言印法依教修行與瑜伽相應得於定中見諸尊大會然未蒙引入此則如第一人次第二人已蒙引入祕密壇中得巡禮供養而未蒙聖尊現爲灌頂等第三既蒙引入大聖衆中從初至末一一祕密之行皆蒙聖者方便告示如第三人也第四者已善修行祕要之道現蒙諸尊爲作祕密傳教三昧耶即爲如來所使行如來事也第五已具前事又見己身於大會中自作阿闍梨師即是入地人也此人纔入三昧耶即見一切佛會乃至十世界微塵大會悉能集之而於其中同彼尊位也云云此中第二三昧耶是結縁灌頂也第三三昧耶是大法小法受學入壇灌頂也第四三昧耶是授傳教位灌頂也即前大悲胎藏都會壇中所行法也第五三昧耶是今祕密曼荼羅所行灌頂此有二種一即前第三灌頂時所入則有大悲藏壇大法小法及祕密壇大法小法灌頂也二亦前第五灌頂時所入祕密壇傳教灌頂也准下第五祕密三昧耶云已具前事又見己身於大會中自作阿闍梨師故知此初第五亦是阿闍梨位灌頂也此大悲壇及祕密壇各有三種灌頂今祕密壇事業灌頂文云弟子及師七日作之然無別出七日行法故知前壇七日行法所未説者今加説之故須只於前説七日行法隨其所闕可加此品所説祕密故義釋云於此大悲藏生曼荼羅有所闕故不得疾成無上菩提故次第同祕密方便然此大悲藏生前已説竟何故更説有何差別耶然雖前説者是爲祕密更有祕中之祕密中之密若不得此法者設通達前法亦不得成故爲最祕要也若解此者一切世間出世間諸曼荼羅皆同用之無所不入也云云前壇七日法前有四支分一阿闍梨支分二攝受弟子支分三擇地支分四擇時支分七日時中有六支分一治地支分五日行法二成就弟子支分六日行法三圖曼荼羅支分四素辨供養支分五灌頂支分六護摩支分七日行法前品義釋經中雖不説而至祕密釋多用此品意此品經中前法所説不更言之前未説者追加釋之故須修此品灌頂七日法直依前品七日行法亦加此品祕密行法故今前後兩法具闕一一配出第一阿闍梨支分此品問云阿闍梨有幾答云有二義釋名爲見諦未見諦師亦名深祕顯略阿闍梨也第二阿闍梨支分中明攝受弟子儀式私名一支分也下第六日弟子法中取具十徳此品問云弟子復幾種答云説四種弟子義釋名爲一時二非時三倶非四具一切相彼品云若見衆生堪爲法器自往勸發此品問云云何知地相好地惡地上中下成就所用等也答云最初知地相即所謂心地義釋云所謂地者是菩提之心第三治地支分中擇地支分私名一支分彼品云彼堅住受教當爲擇平地義釋云今造諸壇何處皆得如毘盧遮那遍一切處平等心地方作大悲曼荼羅此品問云云何而擇治義釋云云何簡擇也義釋云心地應造曼荼羅曼荼羅須擇故次明擇地第四擇地事中擇時支分此品不釋准前行之以下同之六支分中第一治地支分此有六日行法十五種也私云初加入堂法爲十六也二加持供物法三警發地神法此亦更有八法先爲一切如來作禮私云是九方便等二初字門觀此品問云曼荼羅何先答云曼荼羅初業十二支句生大力持明王所應最先作住於本三昧解了瑜伽道而作衆事業義釋云先住被明王三昧者只是大日也此謂心中置十二字中最初字以持身也欲作曼荼羅要須先誦然後即住瑜伽當正觀察今此所作宜以何事謂隨五部五字差別之用或方或圓或三角半月等類上中下壇宜作何用弟子根性云何如是等種種皆知方可作也私云攝大儀軌取此品意三昧耶前先作初字門觀然言初者是曼荼羅最初所作十二字中最初字也三以三昧耶法界金剛自性加持自身私云用被甲頂髻大護四用字門淨自心地弟子心地道場地入祕密法品云眞言遍學者通達祕密壇如法爲弟子燒盡一切罪壽命悉焚滅令彼不復生同於灰燼已彼壽命還復謂以字燒字因字而更生一切壽乃生清淨遍無垢以十二支句而作於彼器如是三昧耶一切諸如來菩薩救世者及佛聲聞衆乃至諸世間平等不違越解此平等誓祕密曼荼羅入一切法教諸壇得自在我身等同彼眞言者亦然以不相異故説名三昧耶義釋云字爲弟子身字燒業煩惱令成灰已心安字流水洒灰令竪生淨菩提心身火與風倶依空住五輪具足以十二支生句布身三分以布師壇弟子上大悲藏不用此法終無成理望成人師不從師問自損損他現當受殃云云攝大儀軌三部後成金剛薩埵建立儀軌用大眞言王三處布字私云師地弟子竝用此法字輪品布字法祕密品佛生偈入位品眞言王具縁品按地持誦法竝先師次壇後弟子作之然具縁品義釋云以字門淨除自心地弟子心地及道場皆以字門轉之便成金剛前文爲善五以三字起三輪此品云眞言者圓壇先置於自體自足而至臍成大金剛輪從此而至心當思惟水輪水輪上火輪火輪上風輪次應念持地而圖衆形像義釋云凡欲建立大悲胎藏建立弟子時當先住於瑜伽而觀自身五處五輪地水火風空觀自身已次觀壇地翻倒置又觀弟子如是安立私云此品先問地相淨地次問淨諸弟子答中以菩提心答地相等義釋正以菩提心爲地先答心地後答淨諸弟子故須先觀自身次觀道場然後觀弟子心地文云次應念持地者准無畏軌是成器界之文即以五字安立五輪次以十二眞言王布地三分内中外也即持誦之此大眞言王總含三部五輪一切諸尊三密如義釋説地水空火風是佛部也蓮華部是金剛部風火遍三部用蓮華部自有地水空火風息災須方輪増益須水輪降伏須火輪等隨類用之私云亦隨五事用之攝召半月風輪辨事種種形空輪佛部金剛部亦爾此五門同上五字輪隨一輪中自有四輪私云三字如上即寂増伏三是事也地水空火風是攝召風中四輪也地水空四火風是相増火中四輪也若辨事空輪種種形或作一團圓之點縱作四輪猶是地水水風也更有三道眞言身眞言語眞言意眞言此三道眞言曼荼羅中一切諸尊身語意密此四種輪合隨彼輪加持自身即得自在用三道眞言亦合加持自身三業云云私云第三三昧耶人或入祕密都壇或入諸尊別壇或入三事五事別壇之時當依此中意也都壇如前若別壇時不用前五字輪直用大眞言王三部五輪經云祕密主説眞言王已一切如來住十方界各舒右手摩頂稱歎善哉佛子汝已超昇毘盧遮那世尊身語意地爲欲照明一切方所住平等眞言道諸菩薩故説此眞言王何以故毘盧遮那世尊坐菩提座觀十二句法界降伏四魔此法界生三處流出破壞天魔次得世尊身語意平等身量等同虚空語意亦如是逮得無邊智生於一切法自在而演説法所謂此十二句眞言王汝今現證毘盧遮那世尊平等身語意故衆所知識同於正遍知者釋云三處者謂如上所説佛身上分出諸如來中分從心至臍出諸菩薩下分從臍至足八部等皆從如來三業普門示現大漫荼羅胎藏莊嚴之位即是本尊眞言印也從内證徳現如來事普伏四魔無有遺餘阿闍梨欲造曼荼羅時亦須想於自身一同毘盧遮那即同自在之力亦同彼佛能伏四魔次佛坐於金剛道場纔念此三道眞言謂如所説身語意三眞言也當如是念時即得身語意法界之體而降四魔所云三道有一釋云此三道眞言身語意自在之力從佛身出由此超入三平等地隨上中下普門示現種種本尊眞言印法如來所以得如是力由觀十二字輪法門當知此十二字輪法門即是法界體性然金剛藏雖未究竟一切種智諸佛所加亦如如來若證知此法者即是同於如來也六一縁諦觀一氣誦阿字門此品問云云何加持地結護洒淨等有多義亦問三事三事謂師弟子及地答云初加持是地依於諸佛教第二心自在唯此非餘教義釋云當用字而加持之或加於頂及加眼等是堅固菩提心初加持地依於佛教謂字也弟子心自在謂安點也初依佛發心即字後即成佛即雖未成佛即無縁種子也七長跪右手按地誦偈警發地神八五供供養諸佛地神四加持地法用不動明加持三地五觀心蓮上如意珠善惡中現觀三種地六掘三種地如法擇治此品問云云何當作淨唯有三問答云我已説作淨如前修事業義釋云心地應造曼荼羅曼荼羅先須擇地故次明擇地所謂地者即是菩提心先淨此地即淨其地如前所説淨菩提心方便謂觀八葉蓮華於華臺上而觀字乃至當頂而置字眼亦安字而觀其心其咽勿令大低大直之類此等皆是淨其心地之方便也既淨心地次安字於其兩目而以觀之即是擇得心地而更除遣諸穢也此方便前已具説當如前説之七還平治已塗三種淨此品有三問答釋之問云云何彼堅住雖作淨了恐爲障者所惱故問云何安住准有三問答云若離於過患當得成眞淨離一切諸過心地無所畏竪住如是知見自三菩提義釋云離煩惱等竪住淨地問云及淨諸弟子既得弟子先作何事答云應當爲弟子而淨菩提心義釋云縁地事總答了既淨菩提心當以大悲而長養之問云云何已淨相此問師地弟子三事爲三句問答云故應捨分別淨除一切地義釋云前壇中説一肘去惡雖淨過肘有穢淨菩提心離一切糞已上初日行法八穿壇中心辨事加持安五寶五香五穀五藥已上第二日行法九取灌頂瓶量埋寶處十加持點位此有二法一日日三時辨事加持二大小方位諸尊位處白檀點記已上第三日行法十一白壇供養請白法此有六法一第四日暮香水洒淨二用白壇塗作圓壇八位辨五供三自住佛室此品問云事業誰爲初治地洒淨竟終壇所應作事有二種外謂縁造壇衆事内謂自觀其身如大日如來等種種瑜伽之法用何眞言等法也爲先作護爲先淨除即問前事前後也此三事是作用也私云三事謂一觀身瑜伽所用眞言等可答前壇住佛室觀是其法也此壇字輪品説先住佛位作曼荼羅是其法也二爲先作護三爲先淨除可答上警發中先用不動加持作護次以等字安心頂眼等淨除遣穢故當先作護後淨除也又前壇中欲造都會一壇故作大日尊佛部成身法今此壇中欲造都會大壇三部釋迦佛等四大菩薩各各別壇故布三部字輪以爲三部種子而成自身壇場弟子三事前壇心安字頂安字成大日身作都會壇是成佛部阿闍梨身於下二部皆得自在此壇亦然當以佛部布字作都會壇若作三部別壇之時當用三部布字義釋云若爲人作阿闍梨欲造立曼荼羅者先須住於世尊之位謂以此諸字門而合集成身即是同佛隨心所作任運皆成私云先以五輪成自身道場弟子次四處布字輪次觀察法界入於倶舍以如來奮迅平等莊嚴藏三昧出現法界増身共以一音説如來發生偈能生隨類形諸法之法相諸佛與聲聞救世因縁覺勤勇菩薩衆及仁尊亦然衆生器世界次第而成立生住等諸法常恒如是生由具智方便離於無慧疑而觀此道故諸正遍知説以前字輪加持之力佛身出現四重諸尊觀自心上圓明安立佛身四重種子形也四觀作八尊前起五輪已警覺了今於地上觀香水海中妙高山王大蓮華上大宮殿中大覺師子座上觀曼荼羅如下圖尊文説五轉爲成金剛薩埵身奉五供養六誦白偈已上第四日行法十二受持地法此有五法一第五日暮次第具諸法則好自嚴身觀八曼荼羅位奉請結護等一一周備竟當誦不動或降三世加持此地又第三日以去皆用不動加持此地私云可有即座行法此品問云云何而作護結護洒淨等有多義問用何法護地作護亦問師自作護及護地護弟子有三問答云護以不動尊或用降三世義釋云恐其退沒故須結護當取不動之心當護弟子即是字門也用降三世亦得私云前壇經文不説義釋取此品意用此二明王也二以大日身誦持地眞言八方皆誦私云五字持身心安字等以成大日身如前壇法三作禮供養私云以事業金剛身作之四就本座持誦本尊及八位尊印眞言各有成身持誦法則若更兼持第二院第三院上首諸尊乃至都誦諸位亦得香水洒竟亦得作之五持誦竟供養遍歎十三取好相法若有魔事作護摩法又有結修多羅受持弟子名號法十四規界定方法至灌頂夜方造諸尊若不速成持地以後漸修無咎已上第五日行法私云已上皆是治地支分十五持誦按地法第六夜師及弟子澡浴清淨著淨衣持供物詣白檀處如法加持自身道場弟子其護弟子如下入灌頂時所説觀白檀位諸尊持彼印明手按八位一一誦一按餘位亦得十六攝取弟子法此有十五法一爲諸弟子説法開導二教彼三歸三懺悔先罪四發菩提心五授香華教令運心供養諸尊六爲授三世無障礙戒七授齒木八作金剛結繋弟子臂九供養諸尊十延請十一讃歎十二發遣十三説法十四取夢十五若惡相作護摩若善相慰令喜已上第六日行法上來十六法中若此壇中所説不者皆依前壇行法作之
