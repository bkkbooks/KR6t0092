body:
  text: 大日經供養持誦不同第六大悲胎藏生祕密曼荼羅壇事業灌頂七日行法第七日上十七門前香水法此有二法初第七日暮以金剛薩埵加持自身為大日尊作禮然後誦降三世加持淨瓶寶等準前置白檀觀門外灑欲入壇者次加持香水令飮少許名金剛水亦名誓水以上第二成就弟子支分之餘十八素辨供具法是第四素辨供養支分前品此法在圖尊下此品在上至日入時師伴弟子澡浴齎持供物往詣壇所一一加持於檀北面一處置之此品問供養復有幾云何華香等此中更有塗香燈等及寶樓樹等種種獻供之物皆唯例而作所以言等等者多聲也問獻香華為何方法華令奉獻誰謂華有若干所應獻之尊亦有差別也獻佛用何華菩薩天等用何也香等亦然準華而説奉獻華時復云何以何法而獻謂須有真言加持等也以何法用獻也香等亦然準華而説云何獻等中有上中下差別也次答供養義然此中答或不依問次然皆依所問義於理不失也當知供養略有四種一是供養香華及塗香燈等乃至飮此是世問供也但以物獻二者合掌謂禮敬也此是印也三慈悲四運心謂想香華滿法界運心已即用合掌印也并慈悲三事皆運心也然經中不言香華等於義必當有之也華手發生此是却牃合掌印也此華從手發生也奉一切佛結一切支分印觀菩提心者華手發生謂作印作印已即運心供養也一切支分生印者前已有真言而云未有印也當撿之如是以印加持已當念菩提心想見此華從手出也以此為供養也各各一切諸佛生此運心也及彼所生子等殷勤以是無過華美香光顯法界為樹王供養注想樹遍法界生華供養也以真言加持勝妙復多大雲法界中生從彼雨華諸佛前等者謂從諸佛乃至二乘八部各各依本真言及印用加所供養物而供養之也行者供養香華時當以真言及印加持如供養華即用華真言等也心若不住定何由得然云三昧自在轉也然後運心此華香美無諸過惡願生勝妙其多猶如大雲從法界中生也從彼而雨華從法界生也常生種種光明遍諸佛前又以此華等遍周法界為一大樹如天意樹無異雨種種華雲香幡蓋等及飮物無量無邊不可窮盡普遍一切如來之前種種供養令一一周遍如是運心即以真言加持之謂一一尊所供養各以本真言及印加持也次卑於此者謂八部等亦隨其本類用真言及印也然此諸尊又卑此諸天神今次説諸天或經中有真言如本瑜伽謂各各相應謂與本尊相應也如忿怒用赤等如華者塗香等亦如理相應想念也然此諸尊或經中有真言及印或闕無者別有一普通吉祥之印當以空水二指頭相捻餘三指皆舒散之用北印加持諸物及其壇中一切供養之具悉用加之皆得成也設本尊自有本印臨時忘者亦用普通印加之亦得也其香華等真言即是也前品中香華燈等真言各隨類用也如般若經欲以一華普供養一切諸佛者當修是般若波羅蜜即是此中但運心以一華香以加持及三昧故即普能供養一切賢聖遍於法界令此善根不可窮盡是也若不作普通吉祥印者更有金剛拳印或蓮華印及觀音印但右手作也準地居天合左手作然恐左手有所執作等右手作用加持物亦得也然供養時先用印加已即當捧之標心奉獻方置諸尊之所若是塗香者或用塗彼尊身香亦隨所應莊嚴處置之或但置其前也其捧華等時亦有高下之等若是佛當高齊其身頭頂菩薩在心已下二乘在臍已上佛菩薩持在心世天當臍此定也淨居等天在臍下結印已引向空中獻佛也次而下乃至地居等令轉下也如上有四等諸尊從佛身出今獻華高下亦準前臍下以配當曼荼羅位也然有二種師若瑜伽成者但用三昧心自在故已得通逹真言門故隨心所作便成不必待於事法亦得成也若第二世間師必須於事法用真言及印加持之乃可成也兼見經正文也已上供養支分十九呼所度者法如法護身呼所度者為彼作護灑以香水一處次第而坐已上亦是第六支分之餘二十拼五色線法此有八法一道場門前運心頂禮一切諸佛然後持五色綿向曼荼羅立而頂戴之二觀自身作大日尊成就悉地品意處曼荼羅此中作之三住甘露王三昧誦一切三世無礙力明妃有印乃得四從三昧起尋念諸佛本初不生加持自身告金剛手等五執金剛等從金剛蓮華座旋轉而下頂禮讃歎有偈六告執金剛等説加持偈是勝願佛菩提座即大覺師子座曼荼羅場七身諸支分出現字是一切諸尊法普通種子八拼修多羅此有三法一以前大日尊用成就悉地品成身法拼外界四方四維十字界道各二周已一周在空一周在地二以三尊身拼中台三重界道以金剛薩埵身拼中台第一重以釋迦身拼第三重以文殊身拼第二重亦各二重周準上又有三重寬狹三重重作四分門門有分量今此品云四種蘇多羅謂白黃赤黑第五所應念所謂虛空色空中而等持印定曼荼羅第二持綖經置於道場地線説有四種白黃赤黑更加一種謂虛空色也念此念謂應念持也虛空能含一切色像即是具一切色若但依顯色即是淺青之色如草木葉色白是信義黃是精進赤是念黑是定定色同於涅槃色也慧者即是大空大空具一切相而無有相故為一切色也凡合線時若一一依法者當造曼荼羅安置寶瓶香華塗香燈等及諸飮作種種供養更問方法然後令童女合之當先為受八戒著新淨衣香水澡浴使內外清淨坐於壇中而合之合線之法先預作細絲令極均調大少緩急皆令得所又不得中間斷續連接之也又合時以帛掩口也每色線來去攝牒使成九絲然後合為一縷其絲但有一頭而屈之中間不得接一接一色凡五色合為一繩也若合繩緩急麁細不調又不盡心作之則生障法損師亦損弟子或令其發狂亂等不可不愼也私謂童女是三昧也由三昧極均等調停得成五力五根由此根力即能連持衆行也更問虛空中等持者別本虛空等持云云等是普遍也作謂應如是作也作謂知小大也先定之也等位均等也第二以線置曼荼羅地此有二種為是深行阿闍梨欲作壇時既淨菩提心之地竟於瑜伽中為度弟子故正觀胎藏大曼荼羅加持之位作謂知大小也先定之也一切分位宛然明了如對目前空中等持持是普遍也作謂應如是作也等謂均等也第二以線置曼荼羅地然為度人順世諦故以此方位加於壇地然後於上用五色線等而定方位也若是淺行阿闍梨者亦須先用此線而定方位竟當一一用心而布置之亦令所有方位如對目前或可別用紙筆抄之臨時案用不得臨事疑誤也此云空中等者即是加上所説先共弟子對引其線而定方位且勿令著地先於空中對引各令當心如其次第令得周匝若未有具法弟子未堪共造壇者亦可橛於弟子處而作也既如是定竟即運心布定位次然後得絣繩畫之若瑜伽阿闍梨者亦於此中而作方位見諸佛菩薩天神等然位定方順世間法亦絣線按其形色而表出定當知此為最上之位也圖尊文云用線法當中置橛旋繞之亦置空中及下綖二種也又云師在中持綖弟子繞之半月如字作也私云大日方壇是扇底迦若作四壇亦同前例用線法者別別壇法非上大壇謂增益壇是圓故圓線法當中置橛旋繞絣之以定分限亦先絣空而後置地若師在中持綖弟子繞行絣之準而言之若降伏壇是三角故在三隅可以絣定若攝召壇是半月形故亦當中置絣先絣弓形次絣絃形常如月字形作之若成辨壇是種種形亦唯一點無相形唯心念作然絣綖時首起東北又五壇形即五字相方圓三角半月方圓角月種種具足如大日壇具五壇者一切諸尊一一亦爾二十一加持五色法有五色五尊五字五印加持法二十二調彩色法從甘露王三昧起住無量勝三昧定顯示遍一切無能害力明妃於一切如來境界中生觀了頂禮世尊次先誦大般若經次誦明妃八遍即調彩色二十三下彩色法豫知有五通四重法今此壇中加諸尊座以為六法一依轉字品以大日身調彩色已從定起繞曼荼羅入內心以成事金剛身畫中台一重諸尊次以釋迦身畫第三重諸尊準上次施願吉祥畫第二重諸等誦百遍或千遍二依此品言造壇有上中下若堪能者作畫像壇不辨者作字壇唯為中人可作印壇依具緣品義釋白檀壇云凡曼荼羅轉字之法一一諸尊用本種子或用諸部通種子字若淺者但觀字至法事夜亦皆效此又圖尊初云圖畫時先住瑜伽觀此曼荼羅大會一一形色相貌威儀性類座位印皆悉具足明了然後以殷重心而彩畫之後云凡行者不住瑜伽不合為人建立曼荼羅也初欲畫時先用字門轉作諸尊座位形色性類一一相應即觀是大悲藏即是我身起手畫之如是深行阿闍梨必須於一切時常不離如是佛會也云云此品圖尊初云若作法時自在壇門而坐自作灌頂等法然後得作一切法也此事尤祕但心存之不可形於翰墨也前品所言先住瑜伽者初品大悲藏發生三摩地具十方諸佛皆來證入大日中中出現四重曼荼羅還入佛身行者效之先住瑜伽此品初佛觀察法界入於俱舍以如來奮迅平等莊嚴藏三昧出現法界增身共以一音説如來發生偈有偈以加持身佛身出現有性器界次第成立四重曼荼羅王次金剛手説大真言王加持自身總別壇場行者效之先住瑜伽前品欲作此法先以字淨自身已五字加持住佛室已乃至效佛三摩地效已即觀是大悲藏即是我身一一觀之此品亦須字淨自身已五字加持作四處輪布字住佛位具十號降四魔已乃效佛三摩地效已即作入祕密住位自灌頂法一一觀之前品若形字印隨作一種此品具足作三種法及總別壇皆如下文觀之若第三三昧耶人入總別壇準警發時以金剛手大真言王三部三事等法觀之三凡圖畫法先建內心蓮華藏竟次造第一重次造第二重次及第三重世天此文雖爾行法不爾二品圖尊先第一重次第三重次第二重及轉字品絣線先第一重次第三重次第二重以此為定故須爛脫讀之四中台三重夾門皆竪門標云云四維量幢竽四門四維皆置三昧耶形每於際曲置金剛橛總用五十二枚三重例爾其餘莊嚴同入祕密位品五備五色線以二明王隨一加持每盡了即下橛圍之三重皆爾此品亦有五法加前一種以為六法前品四法合成十法言五法者一經云祕密主諦聽彼密印形相敷置聖天之位威驗現前三昧所趣如是五者往昔諸佛成菩提法界虛空行本所誓願度脫無餘衆生界為欲利益安樂彼真言門修菩薩行諸菩薩故釋云略説五事謂印色尊位及住并三昧印謂手印契印也改為形相也色謂本尊形相分明差別置者方圓半月三角之類也尊位謂曼荼羅中所住方位各各有處所也布置聖位住謂本尊之像非直畫而已由真言印等所引故來至本座加威而住現威驗也三昧謂隨上中下分寂忿悅等儀相也請本尊如法為印及形相配置尊位威驗現前住於三昧所趣也具明此五緣方便故世出世間所有曼荼羅皆能解了二經云當知此最初悲生曼荼羅從此流出諸壇各如其本教事業形悉地安置諸佛子釋云流出者謂人了解此祕密法一切世出世壇皆於中流出隨義相應可解略有四種祕密之法謂事業即是從初至末緣壇種種事業所應作者形謂本尊等形顯分段也悉地即所成果安置位即置本尊方位了解此四法即通一切流出之法更問從此流出諸壇皆依本教所説也三經云一切如來座及諸佛智子悅意妙蓮華世間稱吉祥釋云如世人以蓮華為吉祥清淨悅可衆心今祕藏中亦以大悲胎藏妙法蓮華為最深祕吉祥一切加持法門之身坐此華台然世間蓮華亦有大小開合淺深不同心地華臺亦有權實開合等異若是佛位當作八葉芬陀利華白蓮華也開敷四布若是菩薩亦作此華而令半敷勿令極開其華或白或黃或寶皆得但赤色者世間下華緣覺諸聲聞所謂邊智者當知所敷座芰荷青蓮華釋云若緣覺聲聞當坐於華葉之上或坐俱勿頭華葉此是青蓮華也是青色別有青蓮華種非此類也坐芰荷青蓮葉也除此如所應念居其地分釋云若淨居諸天乃至初禪梵天等世間立號為梵天皆坐赤蓮華中其純赤世稱為座王若欲界天及地居等各隨其位而用表之如帝釋像即畫須彌山王山神坐山上水神坐水上樹神坐樹城神坐城如是甚多可以意得耳以下諸天但分地為坐謂欲界等天或坐草或乾葉等也憶念不忘云云四經云如來部真言及諸正覺説當知白與黃金剛具衆色觀自在真言純素隨事遷然大略有三部毗盧遮那是佛部即是如來法界之身一向白色次觀世音即是阿彌陀佛也其身黃色次金剛藏即是釋迦牟尼其身赤黃即新色也佛説諸真言及諸佛所説者上言佛是舉佛部下言諸佛是佛所説真言謂毗盧遮那所説也如來部中諸真言部謂從佛所生乃至諸神佛所許可皆佛部也下云諸佛者直是諸佛所説不通菩薩以下也此二種皆具二種謂白黃也此但云應當知以白黃和合也謂不太黃太白也雜雜色謂具五色次第應當知金剛手雜類觀自在諸真言自事分者謂隨事分別而用之也佛部一向是息災用其色當白自事業外分觀音純白然其部中則隨業變轉也蓮華部一向是增益用其色黃金剛部一向是降伏用其色雜雜色謂具五色亦隨一部中自有三事分別如佛部中自有息災增益降伏也若息災即依本法而作白色若佛部作增益時但依此法而作黃色若佛部中降伏者但依此法轉作雜色即是也如佛部者當知蓮華部金剛部類可解也自事分者謂隨色類而分其事也觀自在諸真言者此中諸聲即是舉蓮華以例佛及金剛部也五經云四方相重普輪圓如次第三隅半月輪而説形亦然初應知色像所謂男女身或復一切處隨其類形色不思議智生是故不思議應物有殊異智智證常一乃至心廣博當知是其量座印亦如是以及諸天神次説曼荼羅形計合息災在前今隨聲便事增益在前也諸增益事曼荼羅方而中黃色息災壇圓而中白色降伏壑三角其中黑色攝召壇半月其中雜色攝召謂雜取物呼召等也經云四方普者是舉一例諸也如中檀方者乃至外陀皆方若中圓者乃至外院次第皆圓檀中方謂方則普皆方若圓亦如是次第也三角亦然護摩作爐亦爾若壇方火檀亦方也餘皆例知耳次類謂形相也應以相貌為正義亦可謂色像也偈云色像初應知初謂我今説也然諸尊色類種種不同大而言之略有二種謂男及女男是智慧故為首女是三昧為次之也或一切處隨顯形色者如此經中或復餘經尊形或隨一切處顯形色謂應物示形不定故名不思議也各各不同然以類判之若言作白色即是息災用黃色即增益餘可解也見彼男女之殊及色貌即知所用處矣不思議智生者如本尊合作白色然須作增益事隨行心觀作黃色即有增益之用隨心而轉然所作事皆實不虛由不思議智故得然也今謂法界之色於一色中即是一切色能觀之智亦與境相攝故得如是自在而用也為除無智故有種種智生雖知無量智其實是一智前是一切智也以一智現一切智也前問本尊形量大小今次答之然佛普門示現皆為應赴群機機既萬差當知乘亦大小無定也至論一一本尊之形莫不量同法界無有邊際及與始終由智有淺深量有大小故所見身各各差別是故當知所觀本尊隨行者心大小無有定量也當明密迹經三密事所云證智者即是佛也以無盡之智而證無盡之境如函大蓋亦大也阿闍梨安祥入中頂安字心安字遍諸支分持五股印誦薩埵明成事業金剛了次至一一尊位各觀其尊報得樓閣座種子等轉成尊身觀三昧已始下彩色供養法中諸菩薩成身法頂安字等虛空首內安白色字百明心眼安字無垢燈住本尊位心處月輪現金色字觀諸法本不生即從此心起念誦法云云此壇先如上説瑜伽已次成金剛手身作大真言加持用下祕密法品成就弟子法而師身作之謂為弟子身字遍作其身字同方壇弟子在中以字大慧之火燒之令業煩惱垢穢無餘同金剛也心上圓明中安字而出水輪猶如白乳注之生淨菩提心佛種子也火動之時即俱風風即字義也上加點即大空字門也微妙法水從空而注以淨其心即具地水火風空五字義也為欲堅固意生身故更有方便置十二字同十二緣謂十二支句也前説十二字真言王布滿其身初有四字布於上分謂從頂至項也一字頂上虛空字也二字在耳一字在項也如本自性先從眼起好也私云前説成就地品大日成身心字安頂字眼字及供養法菩薩成身中項字首字眼界字名本自性今如彼中入定以眼觀諸字而觀此布字好矣下文云二耳攝二目故先以布左耳目次以布項以布右耳目次以布項從左耳目順行布之次有四字在中分謂二肩上及心上咽上也次有四字下謂臍上一字在腿上一字在足下然髀足皆有二今但一足置之即管兩足也此十二處攝餘身分如二耳字即攝二目等也當取上真言王從初字次第下布之耳然有三等一師自身布之二用作曼荼羅更問布字云何起三加弟子身如是作已能成法器成就三昧耶三昧耶是等義謂我等於佛佛等於我阿闍梨即等於佛佛等於弟子弟子非但等於一切如來亦等一切菩薩聲聞緣覺世出世間天仙之衆若等一切即大日身解此三昧耶入諸教壇得自在如經初具有入大悲胎藏曼荼羅等諸法乃以此法為要用之法若不解此上來所作曼荼羅終不得成也云云經上文云金剛手超升大日身語意地為斷未來一切疑故説此大真言王云云故今阿闍梨用前法以自身成金剛手次於前白檀壇上曼荼羅絣線之地亦作三分布字內中外中台遍知院為佛部內觀世音院文殊等四菩薩院為蓮華部中金剛手不動尊等釋迦世天為金剛部外此出攝大儀軌然布字處布中台下文八葉臺上安九點即此義也虛空眼位諸菩薩位二明王位故是為內布也觀世音位金剛手位普通品説觀世音種子字金剛手體字此中攝第二重故為中布也第三重曼荼羅莖普通品説普世天心入祕密位品説事業金剛持蓮華莖故為外布也故義釋云更問布字云何起云云入祕密位品釋事業金剛淨心地株杌瓦礫等文云金剛有二一智金剛二業金剛云云私云智金剛謂轉法輪印攝大軌云風輪風種子云云即字也業金剛謂頂安字心安字持五股印名事業金剛故今第一重為智金剛蓮華莖為業金剛云云次於弟子亦作前法次至壇上上尊位各觀樓閣座種子等具如次説然始下彩色彩色已次於弟子亦作此觀然此壇中總説都壇四重一壇其中中台三部二大明王釋迦主伴四大菩薩各作別壇凡在諸尊互為主伴一一諸尊隨五種事各有壇法一切別壇皆在此都壇中若隨所樂別別作亦得第五三昧耶祕密灌頂第三三昧耶別尊別願皆在此中故也大日經供養持誦不同卷第六文安五卯十一傳領了實助之
