body:
  text: 供養持誦不同卷第四大悲胎藏世間成就四種念誦法第二世間成就品及成就悉地品隨行一尊一念誦法達磨毱多阿闍梨在烏仗那國出其供養次第法即是第七卷文其次第目具出十四卷義釋世間成就品初今當出之云云不空三藏抄第七卷略出要用名曰略攝念誦隨行儀軌入貞元入藏録奉敕牒別行於世云云無畏攝大儀軌上卷大日一尊一念誦法用六月修亦同第七卷儀式云云後阿闍梨所製大日經供養持誦次第儀二本一運一睿大日經供養次第一卷海大日經持誦要略一卷大日經供養儀式一卷此等四本並同第七卷意云云大毗盧遮那成佛神變加持經略示七支念誦隨行法一卷不空大毗盧遮那略要速疾門五支念誦法一卷此等二本是略念誦法非本儀式故或雜務中臨時用之若欲此中用之或於意支念誦法中用之此八本中以第七卷正為本法若有所樂加用餘本耳然第七卷明四念誦一意支念誦法二先持誦法三具支念誦法四作成就法世間成就品明此四念誦義釋委曲釋之當今行人不了此法或不先作意支念誦直作先持誦或不先作前二念誦直作具支念誦或不先作前三念誦直為他人作成就法法驗難成還謗祕法所謂犯三昧耶者也此法持要當能銘心義釋云溫古第八凡作成就先當具諸支分作前方便供養承事法其次第儀軌與持明藏常途所説大同但此中一切衆緣皆成法界標幟所為事業盡帶瑜伽故蘇悉地等諸經要用此字決之方見深意此則與常途異耳傳法聖者出此三千偈經為存略故於此品中若諸阿闍梨等共所通解者不復具出但舉經中攝頌云如真言教法成就於彼果自此已下心想念誦法餘經所祕今則具言之也阿闍梨於烏仗曩國撰出毗盧遮那供養次第法正是此品所要文多不可備載當別釋之然彼中略有五分第一先當具持三昧耶學處第二次應增益守護清淨行所謂每日三時如瑜伽法敬禮十方諸佛説悔衆罪歸依三寶捨身奉施發菩提心隨喜勸請乃至回向修習三三昧耶金剛甲胄淨法界心如來大護等淨除魔事之法第三次修供養儀式所謂先以羅字門自淨心地及此穢土次當起大風輪及香水海以阿字門作金剛地具足嚴淨大寶莊嚴然後以種子真言轉作大日牟尼等剎塵大衆如法請召示三昧耶奉閼伽水獻蓮華座次以不動慧刀淨除內障金剛薩埵加持自身降伏魔已結作周界更復奉閼伽水以法界心慧刀所淨供物如法供養以虛空藏明轉持大供養莊嚴雲以金剛語諷詠如來真實功德觀佛化雲遍一切處導利群生如是具法界供養已第四當起利益無盡衆生心如法持誦即此品中字字相應已下具説方便今隨文釋之私云第七卷持誦法則品初有四支禪門次有諸菩薩持誦法文殊為上首及普通種子印真言等次有諸菩薩成身持誦法大日成身持誦法釋迦等印真言持誦法義釋次文唯出大日成身觀法次有四種座法次有四法真言加初後句第五真言事業品説持誦已作金剛薩埵身修供養已以金剛諷誦及餘微妙言辭稱歎如來次回向發願次獻閼伽思惟佛菩薩德作禮説偈次啓白説偈次三昧耶頂上解之次用法界本性如持自體思惟菩提心住金剛薩埵若念誦竟以此三印持身所有真言行門修畢法則皆悉圓滿又法界字以為頂相被金剛甲次於清淨處嚴以香華自身作觀世音或住如來自性以法界心置頂以法施法讀誦大乘或以心誦請諸天神等聽之或造制底曼荼羅次所為已畢次從座起以和敬相接諸人事次飮法次休息法次澡浴法次云彼依世間成就品或復餘經之所説供養支分衆方便如其次第所修行未離有為諸相故是謂世間之悉地次説無相最殊勝如前心供養之儀及依悉地流出品出世間品瑜伽法彼於真實緣生句內心支分離攀緣依此方便而證修當得出世間成就故知第七卷是世間成就品悉地出現品成就悉地品世出世持誦品之行法也爾時世尊復告執金剛祕密主而説偈言如真言教法成就於彼果當字字相應句句亦如是作心想念誦善住一落叉初字菩提心第二名為聲句想為本尊而於自處作第三句當知即諸佛勝句行者觀住彼極圓淨月輪於中諦誠想諸字如次第中置字句等而想淨其命命者所謂風念隨出入息彼等淨除已作先持誦法已上意支念誦法善住真言者次一月念誦行者前方便一一句通達諸佛大名稱説此先受持巳上先持誦法次當隨所有奉塗香華等為成正覺故回向自菩提如是於兩月真言當無畏巳上具支念誦法次滿此月已行者入持誦山峯或牛欄及諸河潭等四衢道一室神室大天室彼漫荼羅處悉如金剛宮是處而結護行者作成就即以中夜分或於日出時智者應當知有如是相現𤙖聲或鼓音若復地震動及聞虛空中有悅意言辭應知如是相悉地物如意諸佛兩足尊宣説於彼果住是真言行必定當成佛應一切種類常念持真言古佛大仙説故應當憶念凡行者欲修觀時先當住瑜伽座以阿嚩羅賀佉五字加持自體如悉地出現品及供養次第法中所説所以然者諸佛無上菩提雖復寂滅無相然要當以金剛身坐金剛地方可入證自餘虛幻身土力所不堪瑜伽行人亦復如是欲入微細瑜伽觀如來無邊境界故要當以此方便自護身心又當以無垢眼觀心蓮華臺上阿字門頂上置暗字百光遍照王以此自加持故即同灌頂牟尼之法堪作金剛羯磨猶如具戒比丘乃應和合僧中同秉法事也一意支念誦法復云行者先當一心修習心持誦法使分明諦了任運純熟欲於現法之中作成就故當依數時相現等方便以自期心如法作先持誦能證知障蓋消滅方作具支念誦又自證知悉地前相然後應起成就漫荼羅今此經文從字字相應迄至彼等靜除已皆是從明修習持誦法迄至作成就法事時還同此法持真言也凡修習心意念誦者先依前法轉種子字作本尊身如彼色相威儀寂心法喜威猛等皆如身密之印不得差謬然亦隨事而轉如作息災持誦即觀本尊如白玉色住於寂默之容若作增益持誦即觀本尊作真金色住於法喜之容若作降伏持誦即觀本尊作烈日暉色或如緑寶玄雲之色住於威猛之容今此所論即是常念誦時當一一如漫荼羅本相也當於此尊心上而觀圓明如淨滿月輪空明瑩徹於中現種子或從南謨乃至娑嚩賀字次第而現以一心住於緣中故名為字字相應或此字合而成句一時炳現猶如輪像或如鬘形明白無垢修環右布亦一心住緣中故故名為句句相應也行者初修習時恐心散亂當但觀種子久後純熟當稍加之見此一一真言字如淳淨乳如貫明珠遍有光鬘次第流注入行者口中或從頂入阿闍梨言亦可隨其面門趣從一處流入然以灌頂為善也如是深入時當觀遍布身分充盈浹洽恬怡內暢如甘露灌灑能令無始時來身心垢障漸次消除如觀字者或觀契印或觀本尊深入行者身中當亦爾或見此真言輪已當即調和氣息令脣齒相著而心誦之以舌不至齶但於口中微動而不出聲故瑜伽宗名為離聲金剛語也持滿一落叉者謂以金剛語持之令滿十萬遍然一是衆數之母自餘一切法數皆在其中若滿一落叉未有證驗又當更作一落叉要令成就一月二月等義皆如此也若深祕釋者落叉是見義謂境界現前以心目觀之一緣不亂故名一見如是住一緣時假令種種難起或化可畏形像諸散心人覩之能令狂亂或發大聲假使山王亦可破碎爾時心不驚怖亦不動轉故名善住一見也復次非但見之而已亦復聞之如下句説故廬山遠公念佛三昧序云玄音之叩心聽即同此義非但聞之而已亦復觸之所謂先時多病今悉除愈先時火大增盛者今得清涼先時水大增盛者今得溫眷乃至入口時如甘露昧又於緣中自然得悟十緣生句即是證知義也經云初字菩提心第二名為聲者言最初觀圓明中字此字喻如菩提心以真言妙用因此生故第二從此字出真言聲猶如從菩提心起大悲萬行若聞真聲時即隨其義猶如藉大悲萬行得悟菩提也復次梵音阿乞灑囉此翻為字以一切法本不生故即是菩提心義乞灑是法爾如是非一切如來所作非作故性寂囉者言此心本淨故無塵故名淨菩提心此淨菩提心出如來無邊語輪相故云第二名為聲此是深祕釋也行者初修習時既見圓明中字次從字句出真言聲譬如和風諧韻鈴鐸亦如叩擊鐘磬初字既出聲已運運漸微次字續即發聲如是循環無有間絶流入身中冷然猗樂不可為喻如清颷扇物昏蓋消除善住義亦如前説經云句想為本尊而於本處作者句是善住處義即真言聲中實義所歸趣處猶如百川赴海亦如大悲萬行皆趣涅槃故名為句句即為本尊身者如如來一一相好皆具無量福德集此相好乃成佛身此中義亦如是一一真言聲具無量義集此衆義成真言身且如法界生真言云達磨馱暏娑嚩婆引嚩句憾此十字各是一真言門一一門自具衆義今合此字以為衆名初達磨是法次默暏是界次娑嚩婆引嚩是自義次句憾是我又以衆名共成一句云我即法界自性故此句義共明一法界身故云句想為本尊也若就覺觀説者謂人先見一一真言字形色炳著次從諸字發聲今又總此聲字轉成本尊三昧耶身在圓明中深邃而住當知此尊即具三密以衆字形色故具足身密以衆字音聲故具足語密以衆字義趣故具足意密以三事等故當知行者一緣不亂善住三密觀中次即觀此尊身不作內外之想爾時見本尊身即是自身此是第二轉於一相心中善住一落叉法於諸持誦門中最為勝上故云當知第二句即是諸佛勝句也猶入此勝句故於普門漫荼羅種種身上隨所欲見者即隨意轉成若欲聞彼真言聲亦隨念而出若心有所未悟欲咨問者本尊即隨所問而為説之故能隨意所期作諸成就而今世間執蘇悉地等經不知祕決故如文而住但誦十萬遍即望悉地在身何時可獲耶復次經中更説勝妙方便故云行者觀住彼極圓淨月輪於中誠諦想諸字如次第中置字句等而想淨其命命者所謂風念隨出入息彼等淨除已作先持誦法謂行者如前一緣一相觀圓明中本尊轉作自身已爾時行者但見自身在此淨月輪中一如本尊無異亦於心上具有圓明明中以誠諦心而觀諸字若單字者令字字連環相接猶如貫珠若置句者亦次第右旋瑩然明徹又一一字周匝皆有炎鬘淨妙無比其圓明外亦有光明如秋夜無雲涼月顯照然彼用此真言為出入息息若出時此字隨出息若入時字亦隨入輪轉調轉寂息遍於即爾時不見別有喘息但以真言為出入息以此方便故則能滅除種種觀覺戲論漸淨六根又如是觀時亦隨義用差別如欲內寂其心即白色欲增即當黃色欲調伏內障即當赤色白是本淨義黃是金剛不壞義赤是智光明義也如世人業壽之身以息風連持故命根不斷亦因此息風運動身口作諸事業行者亦爾以此祕密加持淨除其命使無始已來業壽之垢一切消除成本不生真言之命以此持功德身令不失壞方可運動三密作諸成就也若指事而言今此命者即是息風令心散動如風中燈照用不圓今作此隨息方便靜散亂風乃至綿綿漸微出入息斷爾時圓明慧心如密室中燈恬然直上魔事不入照用無偏若能如是者方可於此生中現求悉地而作先承事法故云善住真言者次一月念誦也若行者初習持誦時亦可外觀本尊心上圓明字句明現亦如前然後隨息出入若息入時此字從本尊心上入自身中若息出時復隨息而出至本尊心上如是次第循環念念無間其後不見別有出入息但隨於字漸更深妙無聲無字但當任運出入爾時本尊身不異自身自身不異本尊也復次行者初習觀時雖暫得相態猶如雷光倏見倏滅縱使明白不應昧著而起貢高設令隱滅亦勿退念而自憂悔但一心如説行之施功不已久久自當純熟乃至真言聲字本尊合為一體息風淨除之後觀此圓明欲大便大欲小便小所欲觀者皆現所欲作者皆成譬如巧工得百練臘變轉無礙隨意施為是名初種子心行者先作字聲本尊觀如是合之方成種子如人初託歌羅羅時命識暖合方成種子又如已得穀種植之良田方便養育必得成果行人亦復如是已得初種子心次作一月先承事法即是種植方便也二先持誦法經云行者前方便一一句通達諸佛大名稱説此先受持者前方便正是先持誦法當依毗盧遮那供養次第法具足修之所云一一句通逹者即彼供養法中一一瑜伽道皆使明了現前如初始莊嚴道場時從風輪際迄至金剛地上種種莊嚴如彼文所説無不成就次用種子作本尊時即見塵沙菩薩衆等皆悉坐蓮華臺布烈圓光之內行者為習成就漫荼羅故當如大悲胎藏圖位而布烈之一一觀彼身相并所持印見真言字亦聞其聲至供養時即觀此一華作種種華雲普遍十方世界作諸佛事供養一切賢聖行者於圓明中悉具見之諸餘供物當知亦爾如觀佛化雲時即見自身漫荼羅中一一諸尊各放無量光明光中有無量佛坐蓮華臺往至十方以一切衆生所喜見身隨衆生性欲而導利之亦於圓明之中具足明見次應如法持誦持誦畢已當如法供養次第第五分中出道場時行者更以諸餘善品調伏其心於一一時中不虧法則具如彼説也當知十方諸佛為令持真言者已得調牛良田純熟耕墾於現世田中布悉地種堪任降大悲雨廣植供養善根故説此一月先受持法復次今説深心持誦法謂行者如前觀真言字或觀契印或觀本尊命風靜息恬然安住時但當以慧照之心而觀其義如住阿字門時當以四不生等句而觀本不生義若住金剛印時別觀金剛般若義若住蓮華印時別觀蓮華三昧義他皆倣此今借涅槃經春池譬喻明之如覺摩訶衍人皆知此心識中有實相寶但以無善巧故名以有所得心競持瓦礫謂是真琉璃珠歡喜持歸返為智人所笑今以真言方便一緣善住時還由淨菩提心力三障消除寶性明現然此只是觀心未是證心也當爾之時不可攪令波蕩又不可恐紛動故而不而取之但當一心方便安詳入水如龍樹阿闍梨所説中道正觀及此真言住心品中十緣生句徐運慧手一一披拆磔之令至實際要令明珠在掌方是見心明道人也爾時行者若入阿字門即得本不生寶乃至入賀字門時即得離因緣寶獻塗香時即得無障礙戒寶獻華時即得大慈生寶獻燒香時即得遍至法界寶獻燈明時即得轉無明寶如是入無量門皆當廣説由於一一支分皆見深意故名為一一句通達也若行者修此世間成就前方便時雖未能頓入法性亦當以無所得為方便隨分修行若無般若波羅蜜氣分則是三障中人頂行眷屬云何能獲初悉地果故大品云欲以一供養十方各如恆河沙等諸佛及僧當學般若波羅蜜欲以一衣華香瓔珞末香塗香燒香燈燭幢幡華蓋等供養諸佛及僧當學般若波羅蜜即此意也復次行者初一月將滿時於此心供養中當有證驗設令天時大旱或有種種災患行者隨用一華或塗香等供養十方諸佛回此功德願令降雨即隨其心澤普洽若願所餘災患得消除者亦隨其意尋皆息滅當知淨心種子力用漸彰如根牙漸生宜應方便長養故更作雨月供養法也三具支念誦法經云次當隨所有奉塗香華等為成正覺故回向自菩提如是於兩月真言當無畏者謂於供養法中一一支分悉通達已當隨其所有於日日之時辨塗香華燒香燈明飮等以普遍心供養三寶發大悲願廣及衆生由自功德力與如來加持力及以法界力和合故令此功德雲海等同虛空不可窮盡隨行人心力勢分所作皆成即以如實功德回向大菩提心願成就悉地以福德圓滿故諸障消除是故作成就時無能蔽之者猶如枝條華葉具已滋榮從此無間必成果實故云如是於兩月真言當無畏次作成熟法者正是守護增益此功德華令不夭傷普成就耳復次深祕釋者月喻菩提心行者入初住地時此心極圓淨故名第一月從此已後用月喻之心起大悲萬行供養三寶廣植善根乃至入無動地名為一月供養從無動地已後復以月喻之心起無量方便智業正順回向如來悉地迄至金剛地名為二月供養二月滿已即於菩提漫荼羅作大成就若細分別者就一一地復有因根果三心例如初品中釋今此品所明雖是世間成就然甚深方便隱在其中若求出世成就時還擬議此法以成祕密之分故持明藏法猶若因陀羅宗能滿世間出世種種希願也復次如上所説次第念誦法則為世間大成就故若行者具依此法得成就時即得六根清淨或悟旋陀羅尼總持不忘即以此身遊諸佛剎住壽無量供養親近諸善知識廣利衆生或以手揮空出種種珍寶給與諸匱乏者然尚是生身未得法性身故名為世間成就此中作成就法後品當更詳説也然此法如如意珠亦能曲順世間下劣希願若諸行人欲作世間上中下品成就事者當參用蘇悉地等諸經仍依此品修習心持誦法但能外觀使得明了便可依法作諸成就不必轉為自身故供養法中偈云智者如先所開示現前而觀本所尊於其心月圓明中悉皆照見真言字即應次第而受持乃至令心淨無垢數及時分相現等依隨經教已滿足志求有相之義利真言悉地隨意成是名世間具相行四支禪門復殊異若深行阿闍梨自當於瑜伽中具識成就證驗今為淺行作者略明祈請之法行者滿二月已當於黑白月八日十四日十五日月蝕日等或但於白分之內澡浴清淨著新潔衣誦扇底迦真言而作祈請至於暮間廣設供養并作護摩用童女所合縷線持作七結每結一誦真言如是都了復誦真言七遍繫左臂上思惟本尊右脅而臥當於夢中見自部主或真言主或見明王或見三寶菩薩衆等或見自身誦持真言作諸事業或著白衣或他來供養或登山峯或見乘象或渡大河或升果樹或乘獅子牛鹿馬等或乘鵝孔雀等一切飛禽或見美女佩帶瓔珞手持華瓶或於夢中受得象馬車乘諸寶物等或夢得華果蘇乳酪稻華等或得數珠或見澡浴清淨薰馥莊嚴當知皆是悉地之相如蘇悉地説又妙膊童子經云若者成就轉近當於持誦事業極生愛樂心不攀緑雜染之境亦無飢渴熱惱等苦於諸違法外相之境心不動搖蚊虻毒蟲不敢逼迫毗舍遮等諸鬼不敢踐履其影所出言教皆悉信受轉加總明善綴文章諸書算伎藝自然巧妙心樂善法勤勇修行身無疾患垢汚若人見之及與聞名生敬念心或見伏藏於虛空中聞諸天語復見其形及乾闥婆藥叉之類若見此等勝相便可作成就法也四作成就法又行者欲作成就時當如蘇悉地方便作光顯增威等法灌沐本尊預辨具緣支分自作除一切障大灌頂曼荼羅如法供養然後起首作成就法當如初品方便擇治淨地作曼荼羅方正四門其量八肘或七肘或五肘唯開西門於西面四肘之外作灌頂曼荼羅等中胎量唯開東門其伴侶菩薩等準同前説於大漫荼羅四角外更置三股嚩日羅二合中胎八葉華上及餘三重各置諸尊祕密印相又於中胎佛位之前置本尊印并置一瓶所餘灌頂四瓶在四隅際門外別置一瓶以降三世加持自餘供養儀軌皆如第二品中説既供養已應作三種護摩為欲遣除毗那夜迦故應用成辨諸事真言作阿毗遮嚕迦事為自利益故應以當部之心作補瑟徴迦事為息諸災難故以當部母作扇底迦事如毗盧遮那眷屬即以虛空眼真言或依第二品中寂災真言加護摩法蘇等諸物以三事真言各供養百遍或增加其數次為諸真言主等各供養七遍其上首諸尊亦當加之或用寂災真言通供養百遍乃至不辨者應作七遍或三遍已然後灌頂其中胎寶瓶亦如前每日以不動尊加持竟在華臺上者又用正等覺心加持在四隅者四菩薩加持本尊前者用彼真言持之當令助伴次第為其灌頂或請阿闍梨令作灌頂若依蘇悉地法先用軍吒利瓶第四用所持真言瓶其餘二瓶隨意取用如彼具説也將灌頂時行者安住蓮華臺上觀囉字門自焚其身悉為灰燼已既灌灑竟還用嚩字門生之以祕密瑜伽觀自身作大悲漫荼羅竟應以牛黃塗香薰香芥子線釧衣服等以自莊嚴復當敬禮諸尊旋繞供養為息障故更作護摩後發遣以此因緣故諸尊歡喜令悉地速成也經云山峯或牛欄及諸河灘等四衢道一室神室大天室者是略辨作成就處所蘇悉地云若上成就於山上作中成就於池邊作下成就隨處而作或與真言相應之處當就彼作不依此處成就稍遲於有舍利制底中作一切內法真言皆得成就然佛生處等以大塔中最為勝上若於菩提道場作法者一切魔事不能留礙凡猛利成就於冢間作或於空室中或於一神獨居之廟或向獨樹下或於河邊作之若欲成就藥叉法者林間作之欲成就龍王法於泉邊作之欲成就使者法當於人民集會之處作之若欲成就入穴法者於窟中作之此中深祕釋者欲作上成就時非但選擇名山超出喧卑之境多有清泉華果處亦當安住如是菩提心山超出覺觀戲論多生總持功德處以內外支分相應故能以不思議法力轉成世間悉地之果若不得如是高山次擇平地則以牛欄為勝以離聚落憒閙又潔淨故牛是修觀行者調柔通達之心以生正法根牙堪能續出五種醇味欄以無戲論戒命風靜息於功德田中而收養之比六根清淨高山又為其次也河灘是自為洲渚之義阿含以四念處觀為自洲不異洲自歸不異歸今此宗於本處作本尊身亦是修身觀義言行者雖未得一切調柔但能造斯觀者亦能滌除業垢之命斷隔毗那夜迦往來行處故為次也四衢道者是所欲趣向皆通達義言行者雖未能自身作本尊像但能以聲字本尊融為一相正住三密觀中不為四邊執諍之所障礙者自然隨所趣向所作皆通故可成就如來使者之用次云一室者雖未能渾合三密但能竪住一見善護其心不為八法風雨惡覺蚊虻之所嬈亂者亦可隨其力分作小成就又云神室大天室者神謂本尊大天即是諸佛此中室者名大慈悲言行者雖於一見之中未能不動不轉但能修本尊觀明白現前諸有所作以大慈悲為本依數時相現等方便以如來神力庇衛其身有為事相無虧法則亦堪作小成就及降伏等自此以降則雖精進動苦至終恐無成也經云彼曼荼羅處悉如金剛宮是處而結護行者作成就者此中正作法明具支方便至下品當更説之又云即以中夜分或於日出時智者應當知者有如是相現吽字或鼓音若復地震動及聞虛空中有悅意言辭應知如是相悉地物如意者凡悉地成時有三種相若初夜成者為下夜半為中劑明相動至日將出已來成者為上妙膊童子經云此中有三種相所謂增長氣煙光現次第得獲三種成就若得氣出者當得世人愛敬等益煙出得轉形悉地光出成持明仙潔淨微細之身若作心成就者或畫像動或見嚴身瓔珞華鬘等動或從空降種種天華或微風細雨或覺地動或聞空中無形之聲作如是言汝所求願今當説之或見燈焰增長其色潤澤曜如金光或復油盡光轉增盛或身毛遍竪心大歡喜或聞空中天樂諸天瓔珞之聲或於空中見本尊身眷屬圍繞即應奉持閼伽五寶華香之水讃歎供養恭敬䠒跪自觀功力而求諸願既得願已歡喜禮拜更獻閼伽應對彼尊誦所受真言然後如法發遣彼中具説方便也若深釋者初夜是如前覺觀乃至具成就時以心猶住於相義名為初夜中夜是六根漸淨不生法愛時例如小乘已過頂法爾時罪福正等從此已後轉近真明是故義名中夜夜分已過劑於日出喻見心明道時爾時所成就法名為上成就也復次下成相自如常途所論若依淨六相中釋者即是於瑜伽中見無量持金剛慧者以加持大師子吼説此吽聲或諸如來以大法鼓音滿其所願或於定中見十方莊嚴世界普皆六種震動於虛空中説此梵音慰喻之聲而實來無所從去無所至如般若薩陀波論品中所説當知是諸行人世間大成就相也復次行者自見心明道時現覺吽字門故得聞大日如來語密記聲動彼金剛心地生萬善牙發起大悲萬行遍發如是阿僧祇大願時十方諸佛皆悉現前以梵音慰喻當知是諸行人出世初成就相也大日經供養持誦次第不同卷第四交了
