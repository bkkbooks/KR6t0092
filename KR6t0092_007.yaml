body:
  text: 大日經供養持誦不同第七祕密曼荼羅圖尊分一大日尊別壇名正等覺曼荼羅亦名毗盧遮曼荼羅亦名最初悲生壇最初等正覺敷置曼荼羅密中之祕密大悲胎藏生及無量世間出世曼荼羅彼所有圖像次第説當聽四方普周匝一門及通道金剛印遍嚴中羯磨金剛其上妙蓮華開敷含果實於彼大蓮印大空點莊嚴八葉悉圓整善好具鬢蕊十二支生句普遍華臺中其上兩足尊導師成正覺以入曼荼羅眷屬自圍繞當知此最初悲生曼荼羅從此流諸壇各如其本教事業形悉地安置諸佛子釋云其作法先作四方曼荼羅其界唯用羯磨金剛智印周匝相連以為其道唯安一門其中又作十字金剛印亦如前作之但以十字為異耳其十字金剛印上畫作蓮華仰而半敷合此十字如華之莖也其華上又安八葉之華即如前五佛四菩薩方位也當以心想而置九點即是臺及八葉各想一點也此點即是大空之證此成正覺義也於此八葉及中當作方圓曼荼羅而畫本尊之像佛方壇菩薩圓也此但是行人自為己作不合示人若作法時自在壇門而坐自作灌頂等法然後得作一切法事也此事尤祕但心存之不可形於翰墨也又其臺上當想如上十二字真言王令其字一一分明置於壇上也更問連環置耶以何為次第耶又云華中安子者謂畫蓮子或十或過減亦無在咎云云又四菩薩者普賢巽文殊坤慈氏乾觀音艮是其位也前緣起列衆中或以除蓋障替觀音或以除一切惡趣替文殊其義各異課用一事亦得也此中用觀音為正也已上毗盧遮那曼荼羅竟私云亦如前作之且以十字為異耳者前世間成就品説世間微小成就四種念誦法次悉地出現品説出世大成就法無所不至真言四種念誦法中第四成就法中經云一切金剛色嚴淨同金剛彼中諸障者攝伏心迷亂四方相周匝一門及通道金剛互連屬金剛結相應門門二守護不可越相向擬手而上指朱目奮怒形殷勤畫隅角輸羅焰光印中妙金剛座方位正相直其上大蓮華八葉蕊鬚敷當結金剛手金剛之慧印造漫荼羅初第一重周匝畫金剛此壇三重作皆以金剛為界其方神諸佛菩薩等在後有説處此中未分也此中布列諸尊總同前位但以金剛相連結為異耳所畫金剛周匝為界畫此皆令清淨令無過作之無過謂圓整端妙也其金剛相周匝如此悉皆黃色即是金剛色也此有三事同於金剛色同金剛體同金剛名同金剛也嚴淨同金剛即是淨妙同金剛以此三事同於金剛無有能破壞者無能勝者無能降伏者若作此金剛界已令諸為障悉皆迷惑無敢嬈者既得離障則所成藥物易得成辨也云四方角者此有二義謂壇正四方作又金剛印亦四方作亦正當四方面也云金剛結者如上周匝安金剛皆股股相連即是金剛結義也安門一并緣緣即是如上所論開一路空處為外緣也相應者謂此隨事相應也上成就門向東中成就向北及西下成就令門向南也其界金剛相連亦是金剛義二守門者為作成就之物最須守護以此守門為要即是上所説威光難視及相向守門者也皆竪指為印印在下説二俱赤白作極忿怒之形角置輸羅并焰即是獨股金剛但有角處皆置之也有焰中金剛安同喜座四方處相對者於曼荼羅最中置十字羯磨金剛令正四方正當四方面也於彼上作大蓮八葉并蘂在金剛上作也此即同於金剛之座故言金剛同也結金剛印即是結金剛手五股印故云金剛智者金剛印也云云此文云此壇三重作亦云布列諸尊總同前位但以金剛相連結為異耳者前大悲藏嘉會壇中台三重都有四重故此成就壇亦有中台此祕密壇亦有中台三重故今文云亦如前作之但以十字為異耳可謂大悲壇五色為界道成就壇五股為界道祕密壇十字為界道此二壇中有列諸尊同前大悲壇中台三重何以知之義釋次文八葉諸尊乃至二乘諸天閻摩王等互安中台是從中台乃至超取第三重經下文云不動曼荼羅風輪與火俱依涅哩底方大日如來下釋云在泥哩底方者故毗盧遮那之西南方作也又經以四菩薩立四方名釋云此是大壇第二重諸菩薩位也云云故知此祕密壇亦有四重中有九類一大日二佛部三蓮華部四金剛部五二明王六佛眼七諸菩薩八釋迦九四菩薩以為大壇互以諸尊安中台也是大阿闍梨祕密行法不可輒示第三三昧耶人若作大日大壇了時若隨五事作餘尊法者不改大壇直以所樂之尊入中台位故義釋云凡作餘佛壇如作彌陀壇即移彌陀入中其日佛移就彌陀位若是二乘諸天等即不合坐八葉華當去之但於方壇中坐其本座八葉上佛菩薩各移稍近外各依方所也其大日佛當與寶幢并在一處左右無在也然亦須在中台院內耳如以閻摩入中者其外院本位但表地印而供養之也此作扇底迦等增益亦同之用線法當中置橛旋繞之亦置空中及下綖二種也又云初在中持綖弟子繞之半月如字作也五種壇線法已如上釋之又九類尊若隨所樂作別壇者義釋上下都有三例一九類中各以主為內院眷屬為次院八部為外院二九類中各以所樂之尊為內院餘尊為次八部為外院三九類中合三部為一類成七類互以所樂之尊為內院餘尊為次院八部為外院但大日三重壇不見正文義推必為第三三昧耶大日持明者可作此壇大日為內院遍知印等佛部眷屬為次院八部為外院又以八葉八尊隨為內院亦準知之互為主伴亦可準知故火吽軌以大日不動為主八印釋云隨持一供養法以豪相印明為大日印明云云義釋云前者大悲藏生是都會壇今此中隨三部各各別有也如此中蓮華部壇中胎是吉祥壇以觀音為主胎外留空地地外即是第二坐位悉置觀音部諸尊餘盡如作大壇其空處亦置十方佛其第三坐位亦置八部衆準前解也又云若作馬頭曼荼羅者作此時何耶疙哩縛在中即移觀音替居勢至之處餘眷屬皆圍繞之餘皆回互可以意得耳又云案此中金剛手為中台諸部類為第二院也又云然此不動尊曼荼羅若別作者不動在中毗盧在中院東方餘金剛眷屬周匝圍繞也又云若佛頂為中台諸佛眼等為眷屬圍繞也又云凡是諸菩薩其本尊菩薩於十字心置之諸餘菩薩在次院中次第而布更外置八部也又云若以釋迦為中則佛頂等列居次院若隨一一本尊中取一為曼荼羅主即移釋迦在外餘皆可例解耳又云文殊為中台餘菩薩為第二重八部為第三重他倣此又云除蓋障眷屬餘義如文殊中説之又云凡此於大悲藏大壇中文殊一會凡四菩薩隨以一菩薩為主置於中壇餘者各於第二院案方而列第三院置八部也若是大悲中第二院者假令以觀音為部主其金剛部及佛頂等並依方位而列為第二院其第三院置八部即不須置文殊會菩薩也若釋迦會者即如上説更問之此説是定義也此事更問不審也上文自體五壇釋云又此瑜伽之座其黃金剛方輪即是金剛之座也方是息災圓是增益三角是降伏半月是攝召點是成辨一切事此虛空輪用心念作之不以形相故也云云又前大悲嘉會壇是息災法故作方也今九類壇各有本壇若隨所樂各作五壇一大日壇四方中有中台八葉之尊五如來更作方壇四菩薩更作圓壇並案臺及八葉之上此大方壇是扇底迦若樂增益等者亦作圓角月點等也二佛部圓壇義釋亦云若作扇底迦等方圓赤白及天等各依本也雖作圓曼荼羅然本尊等座有方圓各依舊也三蓮華部四方義釋亦云如馬頭在三角壇中畫之如法作之住三角中其餘諸尊亦各有形色等別及方圓月三角等皆如廣本也四金剛部四方五不動尊風俱於半月中畫三角降三世同不動在於風方以此為殊六佛母四方七諸菩薩圓明像八釋迦四方釋云五輪中金剛輪方壇也九四菩薩文殊除蓋障地藏各四方壇虛空藏圓壇諸壇眷屬各有方圓角月等座具如後出云云以例言之如大日壇樂作五壇諸院亦爾云云大日壇中又其臺上當想如上十二字真言令其字一一分明置於壇上更問連環置耶以何為次第耶入祕密法品釋以此大真言王一布自身二布曼荼羅更問次第何起三布弟子身而不説布蓮臺上私云此十二字是五佛種子故須以大日布之中央字首四向初安東次第布之彌陀如互安中台之時先以彌陀而為語端以行者向東坐彌陀迎在行者前故取而言之寶幢布西天鼓布北寶幢布東華開布南並以字首向外即是西北東南順行布之故云連環置耶以何為次第耶即是自答云云次想九點即是前釋以十二字布大壇時先以布中台中取其字大空之點安之九位以表九尊皆是成正覺義次台及四方葉五如來各作方壇四隅葉上四菩薩各作圓壇隨形作色此約下文佛母方菩薩圓言之其實依八印品作之此九壇上各作蓮華上作九尊前嘉會壇中台九尊正用白檀壇中五佛形色三昧其四菩薩指八印品今祕密壇九尊亦用白檀壇五佛形色嘉會壇中大日形色及八印品并攝大軌九尊壇印具足用之初大日尊攝大儀軌云寂然三摩地是寂災形白壇文云復當於正受喜增益怒降伏喜怒攝召此四準供養法言之今品亦有五事加成辨一切事明了心無亂無相淨法體是虛空輪壇成辨一切事正受相應身是定印寂災用操持是瓶印攝召用與願等是與願印增益用劍印出火吽軌不動法中是降伏用金剛頂一字軌名勝身三昧耶印此等並是隨事用印形色等也然其根本印明亦有五種一無所不至印明出悉品出現品三月修法是大悲嘉會壇成正覺印二降伏四魔解脫六趣滿足一切智智金剛字句印明亦出前品五壇修法是祕密都會壇成正覺印三大悲胎藏一時頓證八字印明出瑜祇經金剛吉祥大成就品是祕密壇中大阿闍梨真實智品成正覺印四三部四處布字印明出字輪品是祕密壇住佛頂印五百光王印明出百字五品是祕密檀入佛地印故往古阿闍梨等授大日一尊法者本尊印於此五印隨用一印具如別記云云廣大軌云正受相應身寂然三摩地應願濟群生大日正覺尊以八曼荼羅種子字圍繞甚深圓鏡中法界曼荼羅猶如敬制底如來三密門當依如是法次八葉尊八印品釋云然此八印持誦者隨取其一隨事類念誦隨事出之也又云此經皆前後相成共為一事綺互其文行者甚須相照覽乃可行也行者持誦之時亦須作此云云其第一印者作三補吒虛心合掌其二地指及二風指直而開張餘如舊即是也此是毗盧遮那如來威德生印從此中有如來大威德生此是一切智智之明也其曼荼羅作三角形於其四邊又有四三角圍繞之故曰周也其中當觀毗盧遮那世尊而在其中也其三角曼荼羅當觀八葉華華臺上作三角曼荼羅也即是前瑜伽座作此三角其尖向下其色赤也前云三角尖向上今向下者義用殊也想佛在此中而作威光印其真言曰囕𡀩第二如前作印而雙屈二風指以捻二空指頭令皆如吒上字之形此是金剛不壞印金剛者如來智此智非從緣生不可破壞故名金剛不壞也其曼荼羅形圓如蘇上字是娑字第五聲以金剛圍之當是金剛有焰光也其金剛亦在曼荼羅四邊如上也所謂嚩字者此曼荼羅正圓而白耳亦在華臺之上其中有大日如來以下皆效此也然此八印持誦者隨取其一隨事類念誦隨事用之也其真言鑁無敢反嚩無博反第三印如前作印三補吒合掌其二水二火指開張作初剖蓮華形此如來藏印亦名蓮華藏印也曼荼羅如前作圓月輪但以四蓮圍之為異耳中亦觀大日如來其真言三去索第四印如前第三印其二地指相並雙屈入掌此是佛妙音莊嚴印亦是萬德莊嚴印也亦云內外莊嚴也如世間人種種室宅衣服車乘等衆寶之具無所不有以莊嚴之則名萬德皆具今此若內若外如來衆德莊嚴皆具也漫荼羅半月形而側以點圍之餘如前思之也真言憾郝第五如前三補吒合掌而稍開曲其掌二空指開張稍向裏曲開掌以如掬水像也名從佛支分生印謂從如來一切支分而生也其漫荼羅如瓶形者意取瓶腹即是形圓也以四金剛圍之餘如前其真言暗惡第六印如前二火指稍圓屈俱屈入掌鉤曲背相合也而頭相柱此中指也餘依舊即是也謂如第五也此是法住印也其漫荼羅如虹形有諸色間錯猶如虹之暈色也其形如覆虹其下平上有金剛之幡也從上來諸曼荼羅有蓮有金剛有點等今此漫荼羅一一皆以莊嚴圍之相間錯也更問勃馱陀羅尼佛總持此初字為種子謂縛字即無嚩也薩沒哩二合底二合念也末羅力也囉字引聲馱那迦梨作益也謂益念力馱囉馱囉馱羅耶薩鑁上謂自持持我也次謂持他持一切也薄伽嚩低世尊也呼本尊也歎德也阿引迦引囉嚩低謂具形相者三麼曳釋如上也莎訶此恐未審更勘梵本第七印如前三補吒以二手二地二空各相捻在掌內而開火指其水風頭相合也二地上火也漫荼羅虛空形方形作是雜色間錯此是虛空色也如空中含一切色像如來大空智含一切法也其兩邊各一點挾之真言曰阿此是種子也此一字是行吠馱一謂具一切智也謂已證之智也費提二即以此所具慧能惠他人也莎訶第八印合掌掌心相倒已先左轉轉時右手覆而左仰相合如舊也次右轉轉時左覆右仰仍令不散也即是也此是如來迅疾持印謂如來祕密神通之力加持迅疾之義也漫荼羅同前虛空但改作青色也以衆多白點圍繞之真言曰摩訶瑜伽一此也字加三昧聲是種字也瑜伽大瑜伽者諸佛瑜伽也瑜祇上儞二此真言主住大瑜伽也未得瑜伽也令得之謂授與修行者願云云瑜藝説伐哩三於瑜伽而得自在也欠平空也闍哩引生也從空生也迦是作也作此生等於空也雞四莎訶復次第一東方寶幢佛第二南方開敷華王佛第三西方阿彌陀佛第四北方鼓音佛第五東南普賢菩薩第六西南文殊師利菩薩第七西北彌劫菩薩第八東北觀自在菩薩當知此八印一一皆是毗盧遮那印如東方印則寶幢佛印亦是大日如來印他此也依次配四印私云四菩薩者下入位品及抄記文亦同此文是一法也若緣起中普賢慈氏文殊除蓋障替觀音是一法也或以滅惡趣替文殊者是修灌頂時四瓶加持四菩薩普賢慈氏除蓋惡趣是大日四德與前緣起列衆中四菩薩相對論之是一法也無畏廣大儀軌云東南普賢西南文殊西北觀音東北慈氏此重舉世相承之未知出處特違抄記發心修行證果涅槃之次第也云云又大悲嘉會壇九尊種子一二三四依抄記六九七八依廣大軌但改艮乾三摩耶形是佛頂印具緣品釋今祕密壇又九尊種子三昧耶印大真言王及八印品大日宰都波彌陀初割蓮華天鼓萬德莊嚴具寶幢光焰華開金剛普賢賢瓶觀音蓮華上法住印文殊青蓮華彌勘蓮華上迅疾持印次第例如畫四菩薩文殊東除蓋障南地藏北虛空藏西世尊種子三昧耶印具緣品釋攝大儀軌普通藏品三昧耶金剛座上蓮華安印或佛頂相法界生白蓮上字印轉法輪前上輪寶下同憩伽刀契法螺商佉金剛座金剛座金剛五股金剛如來頂頂相毫相毫相釋迦鉢大鉢施無畏施無畏手與願與願手怖魔額上皺相佛眼佛眼相羂索羂索鉤印大鉤心印安印或紇哩二合馱臍印連環圓好相腰印頗旋曲如數珠鬘形藏印如馬寶藏不現之形大界檀荼大護檀荼普光光焰甲印甲胄舌相舌相語門語門牙印牙相辨説持經藏或説法手十力佛頂相念處佛頂相開悟佛頂相並天女形如壇方圓辨其色坐白蓮臺上手持蓮華上以物像用為標幟種子如經云不載者取名初字或可通用字也九壇上安或尊形或印或字轉字之法亦準前壇此有二文一依祕密法可安九尊二依八印品隨一尊祕密都壇大日別壇第二重有二文一依不動壇文以三部衆為第二重故以不動安中大日安寶幢側二準諸尊壇次大日諸三昧為第二重此布列中亦有二説大日別壇三重二佛部尊別壇名如來曼荼羅亦名佛部曼荼羅復次祕密主如來曼荼羅猶如淨圓月內現商佉色一切佛三角在於白蓮華空點為幖幟金剛印圍繞從彼真言主周匝放光明以無疑慮心普遍而流出疏出釋云是本圖也作此佛部曼荼羅作圓曼荼羅其圓如月中白如具色此圓中作白蓮華華上畫三角中作赤色其中畫佛像作何佛更問繞三角以金剛圍之如圖也繞三角置點點標也更問其外輪作光如却敵形也圓外周匝安點今疑此點一一皆是本尊之位更問或可置字光普皆流出者為想光從佛身中流出漸次流布在三角外也真言主謂本尊也遍身有光流出前大壇中亦有三角印與此用處不同前者但是印此中置佛或置印作法圓具於彼也世出世同畫者此同亦可名有也言世出世有無量曼荼羅欲説令善聽也移在上當知此是最初悲生壇次蓮華部此語屬上件此但是祕密曼荼羅也若作扇底迦等方圓赤白及天等各依本也雖作圓曼荼羅然本尊等座有方有圓各依舊也云云私云此中注文是釋大日壇中經第二行及無量世間出世曼荼羅彼所有圖像次第説當聽之文故後人注移在上等此語屬上件者此但是等之文是佛部文次蓮部者是標下壇非此壇文故須得爛脫意讀之前大壇者是前大悲嘉會壇唯用大壇今用或別壇或大壇故云用處不同前但印者是三角印具緣釋云遍知印作三角其鋭下向白光炎圍在白蓮上十方三世一切如來大勇勤印亦名諸佛心印普通藏品名普一切佛菩薩心真言廣大軌云印同大日古來多傳合掌是亦大日百光王印今準八印品釋大日在三角中持威光印是為正文亦是大日大威德生印故佛身光流出圓外注作何佛者即大日也繞三角置點亦是空點也如説九位空點亦是成正覺義外輪作光如却敵形者如輪寶形也圓外周匝安點者是佛部眷屬之位亦是空點同佛身故成正覺義若別作者則遍知印為內院三三昧耶乃至一切法平等開悟三十印諸尊為次院世天為外院及作五事云云佛部別壇三重佛部別壇中台有二文一準不動壇釋可安九尊二準諸壇例可安部主第二重有二文一依大悲壇釋以三部眷屬為第二重故以觀音安中金剛部佛頂等為第二院二依佛母壇以大日諸三昧為第二院故佛頂安中佛眼等為二院三蓮華部尊別壇名觀自在曼荼羅亦名蓮華部曼荼羅復次祕密主觀世自在者祕密曼荼羅佛子一心聽普遍四方相中吉祥商佉出生鉢曇華開敷含果實上表金剛慧承以大蓮印布一切種子善巧以為種多羅毗俱知及與白處尊明妃資財主及與大勢至諸吉祥受教皆在曼荼羅得自在者印殊妙作標相何耶揭哩婆如法住三角曼荼羅圍繞嚴好初日暉當在明王邊巧慧者安立釋云作方曼荼羅內畫商佉商佉上有蓮華蓮華上有金剛金剛上又有蓮華蓮華上置觀音菩薩或可安印或安字也諸印上皆安種子字謂商佉金剛及華上也其次院安大勢至等處周遍作光勿生疑慮也以本種子巧皆安置之而作種子等處當置七白吉祥一一皆有二使者此經但略言之自別有觀音部法中具載當別詳檢也更問明妃資財前者大悲藏生是都會壇今此中隨三部各各別有也如此中蓮華部壇中胎是吉祥壇以觀音為主胎外留空地外即是第二座位悉置觀音部諸尊餘盡如作大壇法其空處亦置十方佛其第三座位亦置八部衆等準前解也又云若作馬頭曼荼羅者作此時何耶疙哩嚩在中即移觀音替居勢至之處餘眷屬皆圍繞之餘皆回互可以意得耳康平三年十一月二十一日申時寫了大殿井內教房之內云云文安五卯十一傳領了實助之大日經供養持誦不同卷七私云前者大悲藏生是都會壇者是大悲胎藏嘉會壇也三部唯在都會壇也今則或在都壇或在别壇第二坐位空處置十方佛者普通藏品有一切佛真言也諸印皆安種子者商佉金剛蓮華也七白吉祥此中部主加五眷屬一忿怒為七吉馬頭曼荼羅在三角中在外三重亦作三角即移觀音移居勢至處者是樂入內別作時也其五尊壇方圓角月點等可詳云云隨五種事云云互入中胎云云四金剛部別壇名金剛手曼荼羅亦名金剛部曼荼羅亦名第二曼荼羅復次祕密主今説第二壇正等四方相金剛印圍繞一切妙金色內心蓮華敷臺現迦羅奢光色如淨月亦以大空點周匝自莊嚴上表大風印靉靆猶玄雲鼓動幢幡相空點為標幟其上生猛焰同於劫災火而作三角形三角以圍之光鬘相周普晨朝日暉色是中鉢頭摩朱黷猶劫火彼上金剛印流散發焰暉持以𤙖字聲勝妙種子字先佛説是汝勤勇曼荼羅部母商憩囉及金剛部生金剛鉤索支大德持明王觀自在初割蓮華前品大日右多羅青蓮華開已却合觀毗俱胝數珠鬘觀音左大勢至未敷蓮華毗俱胝耶輸鮮妙華枝勢至左白處鉢曇摩華多羅右馬頭馬頭觀音下十方佛馬頭壇馬頭別壇蓮華部別壇三重蓮華部別壇中胎有二文如前第二重有二文一準大悲壇文以三部眷屬為第二院二依當部文以當部眷屬為第一院馬頭別壇亦準之一切皆於此大曼荼羅中印壇諸佛子形色各如次隨類而相應諸業善成就得釋云次作第二曼荼羅者謂從蓮華部數之蓮華為初金剛為第二部也我正宣説之謂善説也非前非後依次而説也其曼荼羅四方作普以金剛圍之以三股者作界緣相接圍之圍中黃色中安蓮華華上有瓶瓶白如月色或用金剛圍之或用餘物圍之謂隨彼尊之印展轉為中心亦以其印圍之彼瓶上大風謂半月形此中如黑雲狀如雨時雲靉靆玄黑其下狀如有幡形如大風吹形勢流動彼半月中如大猛火焰作三角形其三角亦以金剛圍之三角中赤如日初出色其中置蓮蓮極赤如災劫火焰色謂殷深赤或可赤黑蓮上畫金剛謂或畫本尊形成畫五股印或字也其金剛流出種種焰光若畫形者心上安種子字謂吽引字也若畫印者印上置字也想吽字誦而加持之也此是汝曼荼羅者佛親對金剛手説之故告云是汝曼荼羅也古昔諸佛皆説我今亦如是説也諸明王各依本座類形色者謂金剛母及金剛針鎖之類衆多金剛眷屬各依本尊形色差別或畫形或作印或置種子字也各依其法次第相應謂或成就妙悉地故案此中金剛手為中台諸部類為第二院也此皆説中台也轉作無量壇也先説者安右後言者安左隨所開門以辨左右也私云前品有五金剛此中亦有七金剛加生鉤印品有六五如前亦加槌又攝大軌二明王上有真言主眷屬七大金剛使金剛拳一切持金剛一切奉教四印明云云廣大軌云金剛手右為種子各現威怒身印持地同金剛手左金剛拳外縛金剛手右一切奉教獨股印圖中佛奉教者金剛部如來使者金剛拳二明王間一執金剛五股二忙莽雞五股六金剛針針四部生三商竭羅鑁五金剛鉤七月黶衆器械具緣釋云若作印者金剛座上安白蓮華上表其物若作字者執金剛眷屬通用字餘金剛通用字若準上下壇例側半月中安三角尖向下作之今且依圖作之月黶壇月黶別壇金剛部別壇金剛部別壇中台有二文如前第二重有二文一準大悲壇文二依當部文月黶尊亦準之六二明王別壇名如來使者曼陀羅亦名持金剛衆曼陀羅復次我所説金剛自在者謂虛空無垢金剛輪及牙妙住與名稱大忿及迅利寂然大金剛并及青金剛蓮華及廣眼妙金剛金剛及住無戲論無量虛空步是等漫荼羅所説白黃赤乃至黑色等印形及所餘三戟一股等二首皆五峯或執金剛鬘隨色類區別一切作種子大福德當知不動漫荼羅風輪與火俱依涅哩底方大日如來下及種子圍繞微妙大慧刀或復羅索印具慧者安布降三世殊異謂在風輪中繞以金剛印而住於三處復次我前説衆多金剛之別名也自在謂於金剛得自在也復次此説我金剛執自在者如前大悲藏大會中毗盧遮那之下不動降三世中間畫諸金剛者皆未列名今方列之故云復次也謂虛空無垢金剛金剛輪金剛牙蘇唎多金剛妙住也謂共住安隱也名稱金剛大分謂大者之分即是大心衆生之體分也金剛利謂極迅鋭之稱此壇總以印為之寂金剛寂靜義如涅槃義也大金剛名也青金剛蓮華金剛廣眼金剛執妙金剛金剛金剛直以金剛單為名住無戲論金剛虛空無邊遊步金剛以上列名也各在一處在大壇中安之如是等壇方圓等依前順其色形亦準此也依名次作也周而復始也白黃赤黑等隨文次第最前者白次黃次赤次黑次者又白如是次第也及餘謂所不説者準例解也隨其本類形色而作之也此金剛有十佛剎塵數前列衆與此中互有出沒或此有彼中無可知又此等金剛所持之印或三股或一股即針也此準前次第初作三股周而復始也兩頭印五股也此印用周匝依四鎌狀如四金剛其中有一狀如五股而不開也或鬘者或持金剛鬘也此等金剛各以其本名為真言即此名中最上字為種子吽次隨別字及通用各於心上置之也其手印通用上五股金剛印也不動尊曼荼羅風火俱者風謂半月火謂三角謂於半月壇中畫三角三角中作不動尊也在泥哩底方者故毗盧遮那之西南方作也其心上當置種子字其三角當以刀圍之若不畫尊形但畫刀或索亦得也或三世勝異者謂在半月中以本金剛圍之謂所執印在半月中三處者謂或作形或印或字也然此不動尊曼荼羅若別作者不動在中毗盧在中院東方餘金剛眷屬周遍圍繞也私云具緣品云次往西方畫無量持金剛緣起列衆十九金剛此中亦有十六金剛本在大壇二明王間各各有壇若別作者互為主伴三重作之又二明王各作別壇第二院衆亦有二文一準大悲壇釋用三部衆二依此文用持金剛言十六者隨色作壇白圓黃方赤三角黑半月圖以此等列金剛部皆作圓壇唯金剛輪與無戲論在二明王之中也虛空無垢圖白三古金剛輪黃一古金剛牙赤五古妙住圖黑金剛鬘名稱白三古大分黃一古迅利圖赤五古寂然圖黑金剛鬘大白三古青圖黃一古蓮華圖赤五古廣眼圖黑金剛鬘妙執圖白三古金剛圖黃一古住無戲論圖赤五古虛空步黑金剛鬘十六手印通五古印若作尊形隨以別字及通用字安尊心上具緣釋云執金剛眷屬速用字餘金剛通用字不動尊刀鞘或索勝三世五古二明王別壇各三重二明王別壇中台有二文一依當文可安九尊二準諸壇例可安一尊第二院有二文一準大悲壇釋以三部為第二院二依當文以西方持金剛衆為第二院七佛母別壇名佛母曼荼羅亦名虛空眼曼荼羅亦名諸佛菩薩母復次祕密主先説曼荼羅諸佛菩薩母安置壇形像方正真金色金剛印圍繞最勝曼荼羅今當示尊相彼中大蓮華暉焰黃色遍中置如來頂超越於中分而至三分位應作如來眼自住光焰中遍布彼種子次説佛母曼荼羅前布置曼荼羅形先應知此謂金色前但列名未説尊形及印今列之也先作曼荼羅金剛色四方以金剛為界圍之此最上者尊形自上者謂自此當説之謂此佛母曼荼羅於諸壇最為上勝也次於曼荼羅中作蓮華黃色有焰蓮上作佛頂印其印如佛頂髻形令頂高隆傍畫兩眼形也若作佛母形者當如女天像心置種子字或可但畫印即頂髻也或但作字耳若佛頂為中胎諸佛眼等為眷屬圍繞也佛恆自身火焰中住種子布之謂此印於光焰中住中置種子即是也捨三分位謂捨三座位而置佛眼普布種子謂於壇中遍布之也私云住三分位者佛頂二眼以為三分之位安佛頂了捨安傍位故云捨三分位若別作者準亦三重中胎準為二例第二重亦準為二例準前知之虛空眼為中胎大日尊諸三昧為第二重世天為第三重虛空眼佛頂眼佛母別壇三重中台二例第二重二例亦準前知八諸菩薩別壇名一切菩薩大如意曼荼羅亦名一切諸佛菩薩真陀摩尼次一切菩薩大如意寶尊謂彼曼荼羅圓白而四出遍寂極清淨滿一切希願前説菩薩部中未説者今更説之凡是諸菩薩應須作曼荼羅者皆同此義也其曼荼羅當作圓明之像令極白淨於中作十字嚩日囉二合台台各置標大真陀末尼如承珠標其頭皆置如意珠珠有光焰也其本尊於十字中心置之諸餘菩薩在次院中次第而布更外置八部也極白是寂靜色當極令明淨寂然而住此等菩薩皆能施一切願也寂是息災義也私云具緣釋云此是通一切印若諸佛菩薩經中不云所持印相者亦執此無價寶珠皆得也故若隨樂以諸菩薩安中及第二院皆令執此寶珠若別作者準亦三重中胎準為二例第二重亦準為二例準前知之摩尼尊為中胎十方界諸菩薩為第二重世天為三重摩尼尊如意珠諸菩薩別壇三重中台二例第二重二例亦準前知轉字輪品云次於四方畫四大護帝釋方名無畏結護者金色白衣而現少忿怒相手持檀荼或作彼印或置字句所謂嚩字夜叉方名壞諸怖結護者白色素衣手持竭伽并有光炎能懷諸怖或畫彼印或置字句所謂博字龍方名難降伏結護者赤如無憂華色被朱衣面像微笑在光炎中而觀一切衆會或置字句所謂索字炎摩方名金剛無勝結護者黑色玄衣毗俱胝形眉間浪文上載髮冠自身威光照衆生界手持檀荼能壞大為障者或作彼印或置字句所謂吃懺二合字及一切眷屬使者皆坐白蓮華上真言者如是敷置已次於四方畫作四大結護東方作無畏結護是名也身金色白衣面少瞋狀手持棒若但置印者但畫棒印也或但置字嚩字也北方作壞諸怖大護白色右手持刀著白衣并焰光若作印者但畫刀形若字者作跛字或傍加二點西方難降伏護無有能制伏者故以為名也身作無憂華色如此間深紫蜀葵華也衣亦赤然少淺於身色其面微笑在圓光中立作觀大衆會之狀謂西方衆會也印但畫刀若字作索字南方金剛無勝大護猶若金剛更無有勝故以為名也復次金剛是天帝釋別名然此大護勢力又過於彼故名也其身黑色忿怒形皺眉衣亦黑然稍淺於身面之色也頭上但作髮髻自身焰光也手持棒若但畫印亦但置棒也字作乞釤二合字為種子字也上來四大護皆次并置眷屬眷屬即使者也皆坐白蓮華上私云第一重四方安四大護東方無畏檀荼北方壞諸怖刀西方難降伏女像刀南方無勝棒悉地出現品有門門二守護一不可越左手相擬印圖第一重門北二相向右手相擬印圖門南四隅有輸羅并焰獨股具緣品引入弟子至第一重門遜那優波遮那二龍王守衛之處圖安第三重西門先北次南具緣品釋云第二重遜那優婆遜那皆右持刀左持羂索諸龍圖安第三重私云可安第三非第一第二重攝若四大讀作別壇者可準諸壇棒印渴伽印此云釼形是今所用渴伽此云釼或云大刀西方小刀是惠刀印非此中用相擬勢印輸羅印九釋迦別壇復次應諦聽釋迦師子壇謂大因陀羅妙善真金色四方相均等如前金剛印上現波頭摩周遍皆黃暉大鉢具光焰金剛印圍繞袈裟錫杖等置之如次第五種如來頂諦聽今當説白傘以傘印具慧者勝頂圍以大慧刀普遍皆流光最勝頂輪印除障頂鉤印大士頂髻相是名火聚印廣生拔折羅發生以蓮華無量聲商佉觀察知像類豪相摩尼珠佛眼次當聽頂髻遍黃色圍以拔折羅無能勝妃印以手持蓮華無能勝大口而在黑蓮上次作釋師子漫荼羅即釋迦也諦聽佛子也當作金剛四方令普此金剛是如上所説五輪中金剛輪方壇也普者正四方之稱也其壇黃色極令鮮好於中畫金剛杵三股杵上安蓮華黃色華上置鉢鉢邊通有焰光若作佛形者當畫釋迦佛持鉢又以金剛圍之右邊置袈裟即僧伽梨左邊置錫杖也次五佛頂其白繖蓋佛頂以繖為印畫之置座座上置印且依本部如佛部一切方也或依事謂息災圓等也勝佛頂以刀圍普光皆流出猶如燒鐵焰謂赤焰光也最勝佛頂以輪為印除障佛頂以鉤為印摧碎佛頂火聚佛頂畫佛髻形大士者號會通金剛會通大佛頂以金剛為印阿毗揭多佛頂發生佛頂也是最勝尊一切起尊以蓮為印無量音佛頂以珂具謂商佉也色類應觀謂如前説觀色類謂白黃赤等色也佛毫相用如意珠為印此名曼荼羅此印法等灌頂成就物等用也其息災等則隨形色轉變非此所用也成就皆以本尊在中佛眼當作佛頂髻形髻邊置眼其佛頂黃色以金剛圍之無能勝明妃持蓮華印謂空風指捻華餘指申之捻華指向心前持也若諸尊有印者依文置之若無文取本部主印置之準種子字中也無能勝王作口印在黑蓮之上謂畫作忿怒口其口雙牙上出者是也此等諸佛位若以釋迦為中則佛頂等列居次院若隨一一本尊中取一為漫荼羅主即移釋迦在外餘皆可例解耳私云此文既云此印法等灌頂成就物等用也故知此祕密壇可用祕密灌頂及成就法又此方壇本釋迦壇都在東門中別壇亦作三重二重如文世天為第三院若隨所樂亦作五壇故云非此所用釋迦鉢中袈裟右錫杖左遍知眼佛頂兩邊安眼其佛頂黃色以金剛圍之釋迦右豪相如意珠遍知右白傘繖座上安繖亦依佛部或依五事勝頂以大慧刀圍之普皆流光如燒鐵焰最勝輪除障亦名摧碎具緣釋云第五微吉羅拿譯云捨除鉤火聚亦名光聚前釋云第四諦殊羅施釋云火聚頂髻五佛頂云傘蓋高勝超勝一字光聚是如此品其密印品亦同此也具緣品云釋迦左方如來五頂私云次第左列廣生亦名會通大佛頂前品名廣大金剛密印釋云五股印發生亦名最勝尊一切超尊故圖名最髙佛頂非此尊釋前品名極廣大蓮華無量音聲前品名無邊音聲商佉前品云毫相印之右畫三佛頂私云次第右列色類具緣釋云五佛頂是釋迦五智之頂有五種色真金鬱金淺黃極白淺白三佛頂是三部衆德之頂則有三色白黃赤色寂災增益降伏色攝大廣大二軌八佛頂後亦有一切佛頂佛頂圖三佛頂北一切聲聞梵夾圖五佛頂南一切緣覺錫杖圖三佛頂北密印品有一切佛頂及一切佛菩薩母二印無能勝黑蓮上安忿大口雙牙上出具緣釋云並持刀印具緣品通門大護中釋迦座下云右方無能勝左無能勝妃亦釋迦族此品是釋迦族為定無能勝妃持蓮華印妃口厭印密印品無能勝執蓮華印今品為定從此上皆佛地德故用開蓮華座二乘用芰荷或青蓮華唯五淨居梵王四禪用赤蓮華義準菩薩以下亦令半敷勿令極開五淨居衆入二別壇前品畫五頂了次於北方布淨居衆次豪相右畫三佛頂故都壇中依彼次第淨境界之行所謂淨居天置彼諸印相佛子應諦聽所謂思惟手善手及笑手華手虛空手畫之如法則次説淨居天印經云淨境界行者謂以禪定為味以淨為行耳其印今次列之思惟手謂稍屈地水指向掌餘三指散舒如三奇枝稍側頭屈手向裏以頭指指頭善善手妙好義也謂手施無畏皆用左手右亦得笑手謂迥思惟手當心前令三奇向上華手以風空捻華而申三指其三指或仰掌舒之或竪舒皆得虛空手謂側右手散指而在空中此等天或作笑或作思惟或與願等皆得彼畫法則謂依此法畫之私云具緣品云自在與普華光鬘與意生名稱遠聞等釋云次於東方最近北邊布列五淨居衆阿闍梨云是五那含天子耳云云下釋亦云釋天眷屬之北近淨居天置大梵王戴髮髻冠坐七鵝車四而四手一持蓮華一持數珠右一執軍持一唵字印者左是名淨行者吉祥印所餘四禪諸天皆列其左無熱等五淨居天列在其右毗尼觀淨居天被服儀式制齊整著三衣內衣或是也云云今準經論無煩無熱善現善見色究竟天名五那含若依此義五那天可與梵王四禪為一別壇都壇亦安梵王之北私詳道理此五淨居是阿那含二乘所攝故與一切聲暗緣覺可為釋迦眷屬故具緣品畫五頂了次畫五淨後畫三頂此品釋衆次列五淨若依此義五淨居天可與釋迦為別壇都壇可安三佛頂右梵王四禪之南別壇可安佛後云云淨居通用壇思惟密印品自在天子右手承頰印此品地水向掌三指散向內頭指指頭善手普華天子前印風火差此品云施無畏笑手光鬘天子前印空在掌中此品思手當心三指向上華手滿意天子持華印虛空遍音天子空加水掩耳此品側右手散指而在空中今以密印品為定座上安印十火仙別壇以下品少不次第故依具緣品以為次第也請召火天印當以火仙印迦攝驕答摩末建拏竭伽婆私倪刺婆各如其次第應畫韋陀手而居火壇內次請召火天印當側申右手其風指第三節稍屈又屈空指上節向掌中若先直而屈是請召也先屈而還展是發遣也諸大仙而圍繞之謂迦葉瞿曇仙等皆次第畫之並在火院之中火院即是三角壇其中色赤名赤院也其印如前五通仙人説四圍陀印是也此是梵行者祕記若誦圍陀者見此手印知是何論何部等也瞿曇仙虛空中行欲有二諦汚下地生甘蔗日炙生二子為釋王者是也末建拏坐禪蟻作封遍身恐傷蟻復入定者是也竭伽仙山名約處得名也嚩私仙即舊婆藪仙人者是也盎竭囉私是身汗液義也此仙不從胎生從汗液而生故得名也私云迦葉驕答摩瞿曇末建拏亦云阿跌哩竭伽或云毗哩瞿婆私婆藪倪刺婆盎竭剌婆亦云阿詣羅其印如前五通仙人説者密印品云以施無畏空持水第二節是一切諸仙印隨其次第相應用之釋云施無畏手空持地第二節一切仙印從下與經別第二也先大指捻小指第二節三指竪並也如其次第先開頭指次開中次與地少相離次即放散五指是五大地仙也依經次第也云云私云若空持水是一切仙印若空捻地五種用之是五仙印然五仙次第列文不同座位及法全軌云婆藪阿詣羅瞿曇阿底晒與毗哩瞿描繪圖云婆藪阿詣羅阿怛囉庾瞿曇毗哩瞿而攝大廣大及法全軌真言文云縛斯阿跌哩驕答摩蘖栗加或云毗哩瞿是也其驕答摩明云婆哩二合輸是哩瞿毗明也蘖㗚伽明云俱怛摩二合蘖㗚伽是瞿曇及薩㗚伽二明合出也亦脫阿詣羅明故知誤矣密印釋云依經次第即是此品五仙次第為定用彼五印阿詣羅明可用描繪座位中梵號也圖云火天火后婆私竭伽末建荼瞿曇迦葉脫倪刺婆故知誤矣火天出前品第七夜護摩法中具緣釋云住火炎中額及兩臂各有三灰三指取灰自塗身像也一切深赤當心有三角印在炎火圓中左持數珠右持澡瓶攝大廣軌云慧珠定澡持掌印定持枝青羊以為座妃后持左右用召請印火天后義準同火天用一切仙印此品五仙瞿曇末建拏羯伽婆私倪刺婆依經並用手印安座上也或用三處三灰安座上也圖以五仙安東方以諸大仙等十二火神安南方娑摩醯多捺羅迦忙嚕多露係多沒㗚拏句路誕囊社吒羅乞灑也忙囊娑劫微闕名火神暮訶囊私云若作別壇以十二火神安第二院前右左後如次各四云云以下八方天十二天一一皆有別壇之文唯無三重之文義準中台第一第二重例若有所樂或各隨作五種壇法一一須作三重之壇以十二天及眷屬為中台以各同類眷屬為次院互以十一天部為第三院當壇天族本座之處準置地印供養十一閻摩天別壇閻摩但荼印常處風輪中沒㗚底鈴印黑夜計都印當知焰摩后以沒揭羅印嬌吠離耶后用劫跛羅印如是等皆在風曼荼羅中烏鷲及婆栖野干等圍繞若欲成悉地依法以圖之南方閻摩王當作風壇壇中畫但荼印若印等此壇一角向身一角向外也或隨彼便安置王右邊畫死后以鈴為印若畫身即持之密印品云鈴印具緣釋云閻摩之西作閻摩后及死后今文為定左邊畫黑暗后以幢為印此幢也梵云計都亦搶也二十卷本云旗也具緣釋云東邊作黑夜及七摩怛哩今文為定七母等同用沒蘖羅印密印釋云左手作拳直申空指向上是七母等印七母通用沒蘖羅者密印品云七母鎚印俱吠離也作頂骨印在毗沙門方也二十卷本云此顱骨以笑手狀持之謂屈水地指於掌中散舒三指如笑手狀以持頂骨如持鉢狀密印釋云舒左手而令曲如承髑髏之狀當胸前仰之是遮文荼印也私云攝大廣火二軌以此遮文荼印為多聞屬故不可在閻王風壇七母等眷屬謂烏鷲狐及婆栖鳥似鵄鴉小黃土色觜亦黃是鸇類也此鳥有祕身法此等並在風輪中圍繞七母凡閻摩王部類皆在風輪中也若持華得此鳥亦持七母真言也此等各別自有持誦法今入此曼荼羅會耳以為莊嚴具緣釋云閻王執檀荼印猶如棒形上有人首作極忿怒之狀水牛為座攝大廣大軌云七母并黑夜死后妃圍繞判官諸鬼屬又云荼吉尼定掌爾賀嚩觸之閻王檀荼風壇圖王東質怛羅笈多訊獄者次東夜黑天次東辨才天王西檀荼次西后次西閻摩沒栗底后私云最勝以辨才天為閻王姊故列此中右死后鈴左黑暗后計都七母鎚印三烏及狐並持華皆在中圖歿栗底后左列熱地獄寒地獄毗舍支十眷屬毗舍遮十眷屬私云司善司惡司命獄卒五道大神九種餓鬼可攝此中若作別壇以此等衆安第二院地獄冥官餓鬼鬼衆如次右左前後列之十二涅哩底王別壇涅哩底大刀泥哩底方作大刀印密印釋云左手空捻地水甲上而申風火並竪即刀印也私云是大釼印攝大廣大軌云執刀恐怖形身印同朅誐是諸羅剎娑即有羅剎主羅剎斯將兄羅剎衆四明涅哩底王羅大刀羅剎娑朅誐羅剎斯將兄羅剎衆準同羅剎娑師子印經及義釋不出壇形今且依圖作三角壇圖以羅剎等安西方以摩睺羅伽及女阿修羅及女安南方若作別壇以此等安第二院攝大廣大軌以阿修羅攝天帝族此義為勝故此鬼王以摩睺羅等及野人人者為族西方多野人女形大口也蟒蛇及女蛇并野人如次前右左後列之十三嚩嚕拏別壇嚩嚕拏羂索而在圓壇中汝大我應知種子字環繞嚩嚕拏龍作羅索印如前作圓曼荼羅取種子字圍之謂字當心如印圍之難陀跋難陀密雲與電俱皆具清淨色夾輔門廂衛在釋師子壇難陀龍兄弟作雲印雲中有電復有水形俱在壇門邊也具緣釋云嚩嚕拏是四方護方龍王持羂索印又云於通門第二重廂曲之內置二龍王右曰難陀左曰跋難陀首上皆有七龍頭右手持刀左持羂索衆雲而住云云圖第一第二重不安二龍第三重安之攝大軌云龍方縛嚕拏龍光龜為座門裏前左右忿怒無能勝阿毗目佉對廂曲中大護持明大忿怒次右無能勝次左無能妃難徒跋難徒云云廣大軌除右無能勝及左妃也私云轉字品第一重有四方四大護悉地出現品釋第一重門門有二守護不可越及相向具緣品釋引入弟子文云第一重遜那優婆遜那二龍王守衛之處又云第二重廂曲中置二龍王右難陀左跋難陀釋迦座下右無能勝左無能勝妃云云誠文雖爾第三重八方神中西方為龍護方故圖中遜那二龍難陀二龍安第三重西門是為正文自餘護門並如義釋第一重是佛地第二重是法身菩薩今此二龍是釋迦生身眷屬故在釋師子壇不可以生身龍安佛地法身菩薩護門也云云圖通門南遜那次南龍王并后眷北優婆遜那次北嚩嚕拏龍王后次左阿難陀龍等一切龍私云都壇東門釋迦南安帝釋故圖對彼西門二龍南安嚩嚕拏但遜那二龍恐難陀二龍圖嚩嚕拏南列商佉波頭摩大蓮華和修吉羯勾吒矩利迦摩迦斯得叉迦阿那婆達多娑伽羅束訖勞優波束訖勞三龍臂多二龍優婆波臂多二龍路係多二龍優波路係多二龍訖栗瑟拏二龍小訖栗拏二龍若作別壇以十九龍衆安第二院以二十一龍前左後右如次列之十四天帝釋別壇此品無文具緣品云初方釋天王安住妙高山寶冠被瓔珞持拔折羅印及餘諸眷屬慧者善分布東方五頂之南畫因陀羅坐須彌山天衆圍繞首戴寶冠身被瓔珞持拔折羅及餘諸眷屬謂舍脂夫人及六欲天等具如圖中又云辨才天微瑟紐天商羯羅天魯捺羅天塞犍那天其妃阿闍梨云釋梵左右序列之耳云云私云初二天是帝釋樂天力士密印釋云妙音天印此即攝乾闥婆等此天亦言乾闥婆類故圖帝釋南列舍脂提頭賴吒并乾闥婆衆六欲天魔天他化自在天那羅延并眷屬後三天是梵王眷屬因明論説劫初梵王以苦行形下化人間名骨瑣天即商羯羅是初禪主非三千主嚕捺羅即商羯羅忿怒身塞犍那是鳩摩羅天此云童子是初禪梵王變化也金剛頂十天法中東北伊舍那明亦云嚕捺羅此是大般若云阿首羅女天是鬼首天非第六天又緊那羅是帝釋法樂神乾闥婆是俗樂神故可以此二類攝天帝族經釋不出帝釋壇形今且依圖帝釋三十三天跋折羅攝大廣大軌云手持獨股印舍支四王圖安西方故東持國并乾闥婆衆焰魔兜率化樂魔天他化那羅延并眷屬此品那羅延及后輪印密印品那羅延輪印后持華印緊那羅準乾闥婆準攝大軌云天帝眷屬中乾闥阿修羅前印內縛拳申水樂天印修羅以智手風夾空輪上妙音樂天密印品云如彈弦狀名費拏印此品云妙音樂器印釋云琵琶印圖辦才天普世天心普世天印合掌阿修羅緊那羅若作別壇以三十三天四八三十二天帝在中合三十三天舍支須彌四角四金剛手為中臺以六欲天及第六天內亦有魔天并那羅延妙音樂乾闥婆阿修羅緊那羅為第二院可方圖之十五日天別壇日天金剛輪表以輿輅像社耶毗社耶當知大力者俱以大弓印在因陀羅輪日天作車輪印在金剛印即是正方壇也社耶毗社耶作弓印亦在金方輪立中也須有箭也具緣釋云釋天眷屬之南置日天衆在八馬車輅中并二妃在其左右取謂誓耶微誓耶譯云勝無勝也日天眷屬布諸執曜盎伽在西火宿曜經作盎誐羅迦輸伽在東金攝大作瑜伽宿曜作戎羯羅勃陀在南水勿落薩鉢底在北木設儞遮遍在東南土羅睺在西南鋏劍婆在西北彗計都在東北旗又於南緯之南置涅伽多謂天狗也又於此緯之北置嗢迦跛多謂流火也攝大廣大軌次云摩利支前行翼從而待衛又云摩利支寶瓶圖日天北逝耶后南毗逝耶后次南諸執曜神等日天車輅社耶毗社耶前弓箭摩利支寶瓶準盎伽輸伽勃陀勿落設儞羅睺劍波計都涅伽嗢諸執曜亦準密師品云定慧相合並空立之是一切執曜印若作別壇日天二后前行為中台以十曜為第二院準俗法云東歲星木南熒惑火西太白金北辰星水十六月天別壇月天迦羅奢淨白蓮華敷月天作白瓶并有蓮印具緣釋云西門之南與日天相對應置月天乘白鵝車於其左右置二十七宿十二宮神等以為眷屬密印釋云左手作半蓮華印一如作觀音印法此不同但一手作之是梵天印其月天印一如梵王無異俱想有白色為異耳作三補吒二火二空相交右押左是一切宿印攝大軌云月天之眷屬二十八宿天宮神等圍繞天竺曼荼羅有月妃戰捺羅圖月天南月后名月相北名月后月神次北日月后名赤色次北主十二宮神次北主二十八神宿次北主直神次北主六時神次北主日神次北主月神次北主年神次北主夜神次北主宿對神次北主宿神次北主業作神次北主時分神次北主日歷神次北主牙相侵神私云圖主日神是十二神準大集經閻浮四方海中有四銀山有十二獸住中各二眷屬合三十六禽始自八月一日子神巡行三十撿人善惡云云主月神是十二月將主年神是三無六甲云云月天開敷白蓮華妃準同二十八宿一切宿印十二神準同若別用者日治六宮星張翼師子宮翼軫角女宮角亢氐稱宮房心竭宮尾箕斗弓宮牛女虛摩竭宮月治六宮虛危室瓶宮壁奎魚宮婁冒昂羊宮畢觜牛宮參井男女宮鬼柳蟹宮天竺曼荼羅二十八宿皆持星印若作別壇次月及后十二宮二十八宿為中台以主土神主六時神等為第二院十二主神如次前右左後各四
