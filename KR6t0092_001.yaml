body:
  text: 大日經供養持誦不同第一大悲胎藏嘉會壇中修灌頂時七日行法六日行法經中諸品前後相補有六行儀今略出之第一大悲胎藏嘉會壇中修灌頂時七日行法出入漫荼羅具緣真言法品及轉字輪漫荼羅行品兩品相補共成一壇無畏三藏攝大儀軌中卷行法蓋用此意若欲長時習持諸尊普念誦法當以七日行法日日三時修之何者諸佛菩薩促無量劫在於一念延於一念在無量劫修短無礙入法界故如今行者覺此行故第七夜義釋云祕釋正以道機嘉會為時或促百劫為一夜或演一夜為百劫長短在緣無有定限道場以外衆多行法具如供養法事業品及蘇悉地蘇摩呼等擇地法同伴法護身法結界法朝起法夜眠法掃壇法除萎法洗器法辨供法飮法事業法上厠法觸穢法澡浴法洗淨法除障法縛魔法著衣法往堂法一一各有衆多印明如彼廣教當具用之一入堂法初至道場門灑淨有印明大悲成就云更須洗嗽次稱吽三聲并觀聖衆遍滿道壇有印或有印明次口誦真言而入有印明次入道壇已合掌作禮心念口言諸佛菩薩大法王等常住真身我之肉眼不親知見願以道眼見我歸依作是心已亦當口言我今敬禮三業五體投地而禮此偈出大悲成就次懺悔發願而言我從過去世流轉生死海恣身口意業及嫉妬慳吝邪見覆心故違越三昧耶今對大聖尊盡心而懺悔如先佛所懺我今亦如是願垂加持力衆生悉清淨言已作禮此偈出妙吉祥法二加持供物法初以香塗手修淨三業有印明次燒香逐除惡鬼神等有印明出大悲成就次加持香水灑淨自身供物道場使者印明次加持五供如次陳烈使者印明三警覺地神法初啓白而言敬白十方三世諸佛我等下輩愚鈍凡夫雖掌此印猶如蚊蟻掌須彌山恐無勢力唯願諸佛加護我等令我得成無上正覺結持此印同佛勢力至誠而禮此偈出青龍本次修九方便各有印明玄法本為十三方便睿山九方便前先修唱禮或唱禮前先修神分並是隨方行儀次初字門觀此觀出攝大軌師加印明祕云是入佛三昧耶之種子也次入佛三昧耶有印明次法界生有印明攝大軌云當住於囕字次轉法輪有印明攝大軌云風輪風種子準義釋説三三昧耶為欲同三種佛身成三身眷屬作三種事業加三部眷屬次金剛甲胄有印明師加唵砧準義釋云次入法界作佛事故義釋亦云作如來身時用如來甲作金剛身時用金剛甲當轉換用之又準蘇悉地等以如來肉髻圓光諸相而自嚴身尤善或可通用成辨諸事真言作之私云義準作蓮華身時用蓮華甲又作諸尊各用某甲故烏芻沙摩等三部三昧耶後用根本印諸相好印諸道具印然後修道場觀次頂觀囕字有明師如印若觸穢處當觀赤色私云已服甲胄次同法界次無堪忍大護有印明已上增益守護清淨行法諸壇及一切處通用次淨三種地起三輪法初現前觀囉字淨除三種地云云準入祕密品義釋師及弟子以字燒字心流嚩水火必風俱四輪依空五字具足十二支句布身三分以令堅固上大悲藏不用此法終無成理云云攝大軌三三昧耶後云即入無生字住大菩提心觀身如薩埵住於羯磨輪誦下真言王方作漫荼羅云云玄法寺建立壇初用此文意亦十二支句布身三分云云祕密法品云漫荼羅初業十二支句生大力持明王所應最先作云云義釋云十二字中用初阿字云云次用三字起三輪準疏先淨自心地及弟子心地次淨道場之地皆以字持之使成金剛阿闍梨言欲作此法時先以三昧耶法界金剛自性加持自身用字門淨自心地及道場已先起風輪以字加持之次起水輪以字加持之次起金剛地輪以字加持一緣諦觀一氣誦阿字以是一緣即入三昧逮見祕密大會云云今觀行者一切衆生以為所化次警發供養地神法初一緣諦想誦阿字門次當為一切如來作禮義釋云將欲警發地神先運心思惟毗盧遮那無盡莊嚴身周遍法界十方三世一切如來亦復如是一一無盡莊嚴身周遍法界從十住地乃至初地諸菩薩分證莊嚴身無量無邊滿於法界無有間隙如胡麻中油當觀此身遍至一切衆聖前以清淨三業至誠作禮次警發一切地神有印偈次當以五供供養諸佛及地神已復應歸命一切如來私云當具閼伽五供普供或用印明玄法寺加地神持次第印明師加地天印明青龍寺本加作壇印明四加持地法用不動明加持三地有印五觀三種地法義釋云凡欲擇治地則自觀心蓮華上如意寶珠內外明徹所有善惡於中悉現六掘治地法掘三種地如法擇治觀祕密釋是菩提心擇治垢穢已上最初日行法七塗地法還平治了塗三種淨觀祕密釋梵音無行無我無乘如如即是心之實相已上第二日行法八埋五寶等法初穿壇壇中心深一肘許用成辨諸事真言加持之五寶五香五穀五藥安置其中去垢辟除準供養法法用使者觀祕密釋安立菩提心中五智之寶起五善萠滅五過患故也九置灌頂瓶法安了平正取灌頂瓶置埋寶處貯水插華入五寶等亦觀祕釋義釋云凡內五寶時即應如前敬禮十方諸佛而請白言我於明日當作請法十加持點位法初日日三時用辨事真言一百八遍加持亦云用不動真言次大小方位諸尊位處白檀點記或盡形相或盡字記一一分明今須心記已上第三日行法十一白檀供養請白法初第四日暮加持香水灑淨有印明加持百八乃至千遍次當用白壇塗作圓壇八壇亦辨五供中胎大日位十二指量五佛一壇東方一切如來位東南方一切菩薩位東北佛母位大日右蓮華手位大日左金剛手位西南不動尊位西北降三世位正西通門處即自所住亦須心記塗了布列五供私云巳上皆用金剛薩埵身修之次自住佛室先以五字持身五處八分心觀八葉蓮臺觀阿字作金剛色首中安百光王以無垢眼觀之自加持故成大日身而在二明王中間名為住於佛室私云悉地成就品中此觀委曲及在供養法中云云次觀作諸尊觀作寶蓮華臺寶王宮殿於中敷座上置白蓮華臺以阿字門轉作大日如來以五阿字轉作五佛形色如經云云一一諸尊皆轉本種子字成身私云轉字輪品大日阿字勇勤暗字虛空眼伽字摩尼珠迦字觀自在娑字金剛手嚩字不動尊唅字降三世訶引字又説或以諸部通用字如三部阿娑嚩等若恐淺行不能如是者但觀阿字門生無量光光所至處現彼尊身至法事夜亦皆倣此私云壇有三種謂字印形各具三法所謂種子三昧形色各有幖幟云云下圖尊文云畫了作法事時如法次第起金剛地觀此寶王宮殿在須彌山頂所有一一莊嚴皆如下品云云法事文云先用字淨心道場以字起風輪以字起香水海用字起金剛地妙高山王此曼荼羅即在其上如供養次第法中方便次觀作種種莊嚴云云故知此白檀壇亦同彼法前起三輪巳警發了今於地上觀香水海海中觀妙高山山上觀大蓮華華上觀大宮殿殿中觀大覺師子座座上觀曼荼羅次轉阿為嚩以金剛薩埵加持自身拳塗香華等如法供養如次第法中廣説準供養法觀諸尊已不動印明供等去垢辟除先顯加本法護我身結方隅界一召請二奉三昧耶三獻閼伽四奉敷座五不動除障六鑁布支分七成薩埵身八被金剛鎧九欠置頂上降伏魔十一結大界十二復獻閼伽十三次第五供十四普供十五讃嘆十六具足此法以修供養次然後興大悲心至誠殷重誦請白偈經一行偈義釋梵文玄法本四行偈畫曼荼羅竟移座出壇門外當佛室位置所樂尊或般若經或安數珠若金剛杵金剛鐸等私云今時安杵鈴等即此意也十二受持地法初第五日暮次第具諸法則好自嚴身觀八曼荼羅位奉請結護等一一周備竟當誦不動或降三世密印相應一百八遍加持此地私云若於即座作此法者修前請白已即直住佛室不可必更用三三昧耶等又義釋云從第三日每日三時皆誦百八又三日來有難當停若白壇竟有難必成次當以大日如來身誦持地真言及作三昧印有印明當往東方一切如來壇外東向誦持或三或七能多益善次往南方次往西方次往北方皆背壇誦一周竟次往虛空眼位面向東北背壇誦之次往東南次往西南次往西北又一周竟次更當至誠作禮種種供養私云當奉五供普供讃嘆以事業金剛身作之次還就本座東面而坐誦本受持真言往於本尊三昧如供養法又次第持白壇位諸尊真言并印供養法有諸佛菩薩真言持誦瑜伽法則謂如諸佛暗安頂上菩薩次安頂上餘如佛室等法是也先持部主大日真言一百八遍所餘八位觀彼真言大小持之若更能誦者兼持第二院四菩薩釋迦第三院等上首諸尊乃至都誦諸位亦得也義釋云白壇塗乾香水灑竟即得作之不剋在第四日至法事夜亦準此知又云警發以來不離道場加持念誦平正正處輒修治之衆緣支分素具勿闕次持誦竟乃至諷詠遍歎私云乃至者修供養也十三取好相法如法護身東面而臥壇處安寢夢想心蓮臺中想摩字門如如意珠中現好相若知魔事作護身法又有結蘇多羅受持弟子名號法也十四觀界定方法規畫界域布定方位私云已上皆是建立壇場支分義釋云至灌頂夜方造諸尊若不能速成持地以後漸修無咎已上第五日行法十五按地持誦法第六日夜師及弟子皆澡浴清淨著新潔衣齎持供物請白壇處如法加持自身道場及諸弟子其護弟子如下入灌頂時所説如次第法則具修供養觀白壇位諸尊與密印相應持彼真言手案中胎誦之一遍如是一誦一按乃至七遍餘位亦爾私云若於即座作此法者修前觀界已即直護弟子次修五供次修誦案下護弟子文云觀弟子身作五輪以五字持之心蓮臺中置阿字等使同大日以入佛三昧耶印印頂法界生印印心作轉法輪印印臍各三誦明次轉心阿為縛結金剛薩埵印印五處為成金剛事業云云今以一切衆生為所度故當入法界藏三昧普於一切衆生界安立毗富羅種子以前方便而加持之十六授三昧耶戒法初為諸弟子説法開導一教彼三歸二懺悔先罪三發菩提心四皆如供養法説私云供養法中別無此法當用九方便中三法印明修之及加無畏戒儀中開導文次當授塗香華等教令運心供養諸尊私云當代一切衆生修五供等令獻諸尊次為受三世無障礙戒別有行儀私云無畏説一行記別有一卷此中用之又經及釋有三偈頌初二教誡後一戒相亦加持句以要言之以身口意合為一相奉獻諸尊名三世無障礙智戒即律中云式叉迦羅尼此云應學也彼行儀中加此三偈先誦梵本然後方言釋之彌善次教十種方便學處但四根本及耳語偈唯具支灌頂者具足聞之若於即座作此法者但用此中三偈亦足次授與齒木令諸弟子嚼而擲之以不動加持之或百或千先師取一奉獻諸尊餘授弟子觀器非器授揚子時為説深法我當授汝佛性醍醐極無過味已發菩提心淨除三業宿障以三世無礙智調伏之牙嚙諸煩惱竟以此祕密加持滌除身心過患又淨其口在所遊方勿妄宣傳明日貽汝不死甘露皆令充足次作金剛線法五佛真言各加一色作金剛結繫弟子辟祕觀五智五力攝一切教阿闍梨欲此夜作弟子法時其所供養當滅第七夜之半云云次已印持竟還令次第曼荼羅外東向而坐復當供養以至誠心延請諸尊言我於明日為哀愍弟子供養諸尊故建立大悲胎藏曼荼羅隨力供養唯願慈悲憶念當於明日悉皆降集曼荼羅而作加持彼三請已金剛句偈稱歎諸尊然後如法發遣復為弟子廣説法要教合繫念藉吉祥草面白西寐夢中獲相晨起白師若無成理或作護摩若見勝境慰諭歎喜已上第六日行法大日經供養持誦不同卷第一
